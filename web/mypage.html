<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkNote · My Page</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; background:#fbfcfe; color:#1f2937; }
  .topbar { position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:14px; padding:12px 24px; background:rgba(255,255,255,.94); backdrop-filter:blur(6px); border-bottom:1px solid #eef1f6; }
  .brand { font-size:1.25rem; font-weight:800; color:#1e293b; text-decoration:none; }
  .spacer { flex:1; }
  .btn, button { border:1px solid #d8dee9; background:#fff; color:#2563eb; border-radius:8px; padding:8px 12px; font-size:.84rem; font-weight:700; text-decoration:none; cursor:pointer; }
  .btn.primary { background:#2563eb; border-color:#2563eb; color:#fff; }
  .btn.danger, button.danger { border-color:#fecaca; color:#b91c1c; background:#fff7f7; }
  main { width:min(1080px, calc(100vw - 32px)); margin:24px auto 42px; }
  .hero { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap; }
  h1 { font-size:1.5rem; color:#0f172a; }
  .sub { margin-top:6px; color:#64748b; font-size:.9rem; }
  .snapshot { border:1px solid #e8ebf2; border-radius:12px; background:#fff; box-shadow:0 4px 14px rgba(15,23,42,.05); padding:10px 14px; max-width:420px; font-size:.76rem; color:#475569; }
  .snapshot h2 { font-size:.78rem; color:#1e293b; margin-bottom:6px; }
  .snapshot .mini-stats { display:flex; flex-wrap:wrap; gap:4px 10px; margin-top:6px; }
  .snapshot .mini-stats span { color:#64748b; }
  .snapshot .mini-stats b { color:#0f172a; font-weight:800; }
  .snapshot .weekly { color:#64748b; line-height:1.45; }
  .grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:16px; }
  section { background:#fff; border:1px solid #e8ebf2; border-radius:14px; padding:18px; box-shadow:0 8px 24px rgba(15,23,42,.06); }
  section.wide { grid-column:1/-1; }
  h2 { font-size:.98rem; margin-bottom:13px; color:#1e293b; }
  h3 { font-size:.96rem; margin-bottom:5px; color:#0f172a; }
  .kv { display:grid; grid-template-columns:150px 1fr; gap:9px 12px; font-size:.86rem; }
  .k { color:#64748b; }
  .v { font-weight:700; color:#1f2937; overflow-wrap:anywhere; }
  .stats { display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:10px; }
  .stat { border:1px solid #eef1f6; border-radius:12px; padding:12px; background:#f8fafc; }
  .stat small { display:block; color:#64748b; font-size:.74rem; margin-bottom:5px; }
  .stat strong { font-size:1.25rem; color:#0f172a; }
  .list { display:flex; flex-direction:column; gap:10px; margin-top:12px; }
  .item { border:1px solid #eef1f6; border-radius:10px; padding:10px 12px; background:#f8fafc; font-size:.84rem; line-height:1.45; }
  .item small { display:block; color:#94a3b8; margin-top:3px; }
  .memory-card { border:1px solid #e2e8f0; border-radius:12px; padding:14px; background:#fff; box-shadow:0 5px 16px rgba(15,23,42,.04); font-size:.86rem; line-height:1.55; }
  .memory-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .memory-select { display:flex; align-items:center; gap:6px; color:#475569; font-size:.78rem; font-weight:800; white-space:nowrap; }
  .memory-select input { width:16px; height:16px; accent-color:#2563eb; }
  .memory-bulk { align-items:center; justify-content:space-between; border:1px solid #eef1f6; border-radius:10px; padding:10px 12px; background:#f8fafc; }
  .memory-bulk .bulk-left { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .memory-bulk label { display:flex; align-items:center; gap:7px; color:#475569; font-size:.82rem; font-weight:800; }
  .memory-bulk input { width:16px; height:16px; accent-color:#2563eb; }
  .memory-bulk button:disabled { opacity:.45; cursor:not-allowed; }
  .memory-meta { color:#94a3b8; font-size:.78rem; margin-top:3px; }
  .memory-two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
  .memory-pane { border:1px solid #eef1f6; border-radius:10px; padding:12px; background:#f8fafc; }
  .memory-pane h4 { font-size:.86rem; color:#1e293b; margin-bottom:8px; }
  .memory-pane p { margin-top:8px; }
  .feedback-empty { border:1px dashed #cbd5e1; border-radius:10px; padding:12px; background:#fff; color:#64748b; }
  .snapshot-inline { border-top:1px solid #eef1f6; margin-top:14px; padding-top:14px; color:#475569; font-size:.9rem; line-height:1.5; }
  .snapshot-inline h3 { font-size:.9rem; margin-bottom:6px; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .chip { border:1px solid #bfdbfe; background:#eff6ff; color:#1d4ed8; border-radius:999px; padding:3px 8px; font-size:.74rem; font-weight:700; }
  details.dev { border:1px solid #e8ebf2; border-radius:12px; padding:12px; background:#f8fafc; }
  details.dev summary { cursor:pointer; color:#475569; font-weight:800; }
  details.dev .kv { margin-top:12px; }
  .badge { display:inline-block; border:1px solid #bfdbfe; background:#eff6ff; color:#1d4ed8; border-radius:999px; padding:3px 9px; font-size:.75rem; font-weight:800; }
  .track-card { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .track-card h2 { margin-bottom:0; }
  .track-badge { text-transform:lowercase; border-color:#c8d6f1; background:#fff; color:#2563eb; font-size:.86rem; padding:6px 12px; }
  .nursing-card { display:none; border-color:#bfdbfe; background:#f8fbff; }
  .nursing-card.on { display:block; }
  .empty, .error { border:1px dashed #d8dee9; border-radius:12px; padding:18px; color:#64748b; background:#fff; }
  .error { border-color:#fecaca; color:#b91c1c; background:#fff7f7; }
  .actions { display:flex; flex-wrap:wrap; gap:8px; }
  @media (max-width:760px){ .grid,.memory-two-col{grid-template-columns:1fr;} .kv{grid-template-columns:1fr;} .stats{grid-template-columns:1fr 1fr;} .hero{flex-direction:column;} .snapshot{max-width:100%;} }
</style>
</head>
<body>
  <div class="topbar">
    <a class="brand" href="/">LinkNote</a>
    <span id="userLabel" class="sub"></span>
    <span class="spacer"></span>
    <button onclick="logout()">Logout</button>
  </div>
  <main>
    <div class="hero">
      <div>
        <h1>My Page</h1>
      </div>
      <a id="studyHeroBtn" class="btn primary" href="/study.html" style="display:none; padding:10px 18px; font-size:.9rem; align-self:center;">📚 스터디 열기</a>
    </div>
    <div id="app" class="empty">불러오는 중...</div>
  </main>
<script>
  const configuredApi = window.LINKNOTE_API_BASE || localStorage.getItem('ln_api_base') || '';
  const API = (configuredApi || (location.protocol.startsWith('http') ? '' : 'http://127.0.0.1:8000')).replace(/\/$/, '');
  const token = () => localStorage.getItem('ln_token') || '';
  const headers = () => token() ? { Authorization:'Bearer ' + token() } : {};
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const short = (s) => { s=String(s||''); return s.length > 12 ? s.slice(0,8) + '...' + s.slice(-4) : s; };
  const dateText = (v) => {
    if(!v) return '-';
    if(typeof v === 'number') return new Date(v*1000).toLocaleString('ko-KR');
    const d = new Date(v);
    return Number.isNaN(d.getTime()) ? String(v) : d.toLocaleString('ko-KR');
  };
  async function getJSON(path){
    const r = await fetch(API + path, { headers: headers() });
    const d = await r.json().catch(()=>({}));
    if(!r.ok){
      const err = new Error(`${path} returned ${r.status} ${d.detail || r.statusText}`);
      err.status = r.status;
      throw err;
    }
    return d;
  }
  function loginGate(app, message){
    app.className = 'error';
    app.innerHTML = esc(message) +
      `<div style="margin-top:12px"><a class="btn primary" href="/?next=${encodeURIComponent('/mypage.html')}">로그인하러 가기</a></div>`;
  }
  async function postJSON(path, body){
    const r = await fetch(API + path, {
      method:'POST',
      headers:{ ...headers(), 'Content-Type':'application/json' },
      body:JSON.stringify(body || {})
    });
    const d = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(`${path} returned ${r.status} ${d.detail || r.statusText}`);
    return d;
  }
  async function deleteJSON(path, body){
    const opts = { method:'DELETE', headers: headers() };
    if(body !== undefined){
      opts.headers = { ...opts.headers, 'Content-Type':'application/json' };
      opts.body = JSON.stringify(body || {});
    }
    const r = await fetch(API + path, opts);
    const d = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(`${path} returned ${r.status} ${d.detail || r.statusText}`);
    return d;
  }
  function logout(){ localStorage.removeItem('ln_token'); location.href='/'; }
  function stat(label, value){ return `<div class="stat"><small>${esc(label)}</small><strong>${esc(value)}</strong></div>`; }
  function row(k,v){ return `<div class="k">${esc(k)}</div><div class="v">${esc(v || '-')}</div>`; }
  function compactItem(title, body, meta){
    return `<div class="item"><strong>${esc(title || '-')}</strong>${body ? `<div>${esc(String(body)).slice(0,180)}</div>` : ''}<small>${esc(meta || '')}</small></div>`;
  }
  const chips = (items) => Array.isArray(items) && items.length
    ? `<div class="chips">${items.map(item => `<span class="chip">${esc(item.name || item.concept || item)}</span>`).join('')}</div>`
    : '';
  let currentMemories = [];
  let selectedMemoryIds = new Set();
  let totalMemoryCount = 0;
  function feedbackSection(item, index){
    const missing = Array.isArray(item.missing_links) ? item.missing_links : [];
    const good = Array.isArray(item.good_points) ? item.good_points : [];
    if(!item.has_ai_feedback){
      return `<div class="feedback-empty">
        아직 AI 피드백이 없습니다.
        <div class="actions" style="margin-top:10px">
          <button onclick="generateMemoryFeedback(${index})">AI 피드백 생성</button>
          <span id="feedbackStatus${index}" class="sub"></span>
        </div>
      </div>`;
    }
    return `
      ${item.feedback_text ? `<p><strong>요약 피드백</strong><br>${esc(item.feedback_text)}</p>` : ''}
      ${good.length ? `<p><strong>좋았던 점</strong></p>${chips(good)}` : ''}
      ${missing.length ? `<p><strong>더 연결해볼 점</strong></p>${chips(missing)}` : ''}
      ${item.followup_question ? `<p><strong>다시 생각해볼 질문</strong><br>${esc(item.followup_question)}</p>` : ''}
      ${item.improved_summary ? `<p><strong>개선 요약</strong><br>${esc(item.improved_summary)}</p>` : ''}
      ${item.review_hint ? `<p><strong>복습 힌트</strong><br>${esc(item.review_hint)}</p>` : ''}
      ${item.source_hint ? `<p><strong>다시 볼 자료</strong><br>${esc(item.source_hint)}</p>` : ''}`;
  }
  function memoryCard(item, index){
    const graphUrl = `/concept-graph.html?mode=connection&concept=${encodeURIComponent(item.concept || '')}&course=${encodeURIComponent(item.course || '')}&unit=${encodeURIComponent(item.unit || '')}`;
    const checked = selectedMemoryIds.has(item.id) ? ' checked' : '';
    return `<div class="memory-card">
      <div class="memory-header">
        <div>
          <h3>${esc(item.concept || '개념 미지정')}</h3>
          <div class="memory-meta">${esc(item.course)} · ${esc(item.unit)} · ${esc(dateText(item.created_at))}</div>
        </div>
        <label class="memory-select"><input type="checkbox" onchange='toggleMemorySelection(${JSON.stringify(item.id)}, this.checked)'${checked}>선택</label>
      </div>
      <div class="memory-two-col">
        <section class="memory-pane">
          <h4>내 설명</h4>
          <p>${esc(item.answer_text || '')}</p>
        </section>
        <section class="memory-pane">
          <h4>AI 피드백</h4>
          ${feedbackSection(item, index)}
        </section>
      </div>
      <div class="actions" style="margin-top:10px">
        <a class="btn" href="${graphUrl}">개념 연결 보기</a>
        <button class="danger" onclick="deleteMemory(${index})">내 설명 기록 삭제</button>
      </div>
    </div>`;
  }
  function memoryBulkControlsHTML(){
    if(!currentMemories.length) return '';
    const visibleIds = currentMemories.map(item => item.id).filter(Boolean);
    const allVisibleSelected = visibleIds.length > 0 && visibleIds.every(id => selectedMemoryIds.has(id));
    return `<div class="memory-bulk actions" style="margin-top:12px">
      <div class="bulk-left">
        <label><input id="memorySelectAll" type="checkbox" onchange="toggleAllVisibleMemories(this.checked)"${allVisibleSelected ? ' checked' : ''}>현재 목록 전체 선택</label>
        <span class="sub" id="memorySelectionCount">선택 0개</span>
      </div>
      <div class="actions">
        <button id="deleteSelectedBtn" class="danger" onclick="deleteSelectedMemories()" disabled>선택 삭제</button>
        <button class="danger" onclick="deleteAllMemories()">전체 삭제</button>
      </div>
    </div>`;
  }
  function refreshMemorySelectionUI(){
    const count = selectedMemoryIds.size;
    const label = document.getElementById('memorySelectionCount');
    if(label) label.textContent = `선택 ${count}개`;
    const btn = document.getElementById('deleteSelectedBtn');
    if(btn) btn.disabled = count === 0;
    const selectAll = document.getElementById('memorySelectAll');
    if(selectAll){
      const visibleIds = currentMemories.map(item => item.id).filter(Boolean);
      selectAll.checked = visibleIds.length > 0 && visibleIds.every(id => selectedMemoryIds.has(id));
      selectAll.indeterminate = visibleIds.some(id => selectedMemoryIds.has(id)) && !selectAll.checked;
    }
  }
  function toggleMemorySelection(id, checked){
    if(!id) return;
    if(checked) selectedMemoryIds.add(id);
    else selectedMemoryIds.delete(id);
    refreshMemorySelectionUI();
  }
  function toggleAllVisibleMemories(checked){
    currentMemories.forEach(item => {
      if(!item.id) return;
      if(checked) selectedMemoryIds.add(item.id);
      else selectedMemoryIds.delete(item.id);
    });
    refreshMemorySelectionUI();
  }
  function snapshotHTML(learning, memorySummary){
    const body = memorySummary.weekly_summary || '설명해보기를 사용하면 복습 메모리가 쌓입니다.';
    const recent = learning.last_studied_at || memorySummary.last_memory_created_at;
    return `<div class="snapshot-inline">
      <h3>Learning Snapshot</h3>
      <div>${esc(body)}</div>
      <p class="sub">최근 학습 <b>${esc(dateText(recent))}</b></p>
    </div>`;
  }
  function dueChip(item){
    const url = `/concept-graph.html?mode=connection&concept=${encodeURIComponent(item.concept || '')}&course=${encodeURIComponent(item.course || '')}&unit=${encodeURIComponent(item.unit || '')}`;
    return `<a class="chip" style="text-decoration:none;" href="${url}" title="개념 연결 보기">${esc(item.concept || '')}</a>`;
  }
  function suggestionChip(item){
    const url = `/concept-graph.html?mode=connection&concept=${encodeURIComponent(item.concept || '')}&course=${encodeURIComponent(item.course || '')}&unit=${encodeURIComponent(item.unit || '')}`;
    const tip = `${item.from_concept || ''}(${item.from_course || ''})와 연결` + (item.reason ? ` — ${item.reason}` : '');
    return `<a class="chip" style="text-decoration:none;" href="${url}" title="${esc(tip)}">${esc(item.concept || '')} · ${esc(item.course || '')}</a>`;
  }
  function uploadItem(u){
    return `<div class="item"><strong>${esc(u.title || u.filename)}</strong><small>${esc([u.semester, u.course].filter(Boolean).join(' · '))}</small></div>`;
  }
  function render(summary, me, memory, clinical, memories, due, suggest){
    const account = summary.account || me.user || {};
    const library = summary.library || {};
    const learning = summary.learning || {};
    const memorySummary = memory || {};
    const isNursing = (account.student_track || 'general') === 'nursing';
    const clinicalItems = Array.isArray(clinical?.items) ? clinical.items : [];
    const dueItems = Array.isArray(due?.items) ? due.items.filter(d => d.is_due) : [];
    const suggestions = Array.isArray(suggest?.items) ? suggest.items : [];
    currentMemories = Array.isArray(memories?.items) ? memories.items : [];
    totalMemoryCount = Number(memories?.total || currentMemories.length || 0);
    selectedMemoryIds = new Set([...selectedMemoryIds].filter(id => currentMemories.some(item => item.id === id)));
    document.getElementById('userLabel').textContent = account.display_name || account.email || '';
    document.getElementById('app').className = 'grid';
    document.getElementById('app').innerHTML = `
      <section class="wide"><h2>오늘의 학습</h2>
        ${dueItems.length
          ? `<p class="sub" style="margin-bottom:8px">복습 대기 개념 ${dueItems.length}개 — 개념을 누르면 연결 지도로 이동합니다.</p>
             <div class="chips">${dueItems.slice(0, 8).map(dueChip).join('')}</div>`
          : `<p class="sub">지금 복습 대기 개념이 없어요. 설명해보기를 사용하면 복습 일정이 만들어집니다.</p>`}
        ${suggestions.length
          ? `<div style="margin-top:14px"><span class="sub" style="font-weight:700">연계 학습 제안</span>
             <p class="sub" style="margin:4px 0 8px">지금 복습할 개념과 다른 과목에서 연결된 개념입니다. 함께 보면 연계 학습에 도움이 됩니다.</p>
             <div class="chips">${suggestions.map(suggestionChip).join('')}</div></div>`
          : ''}
        <div class="actions" style="margin-top:12px">
          <a class="btn primary" href="/">My Library · 자료 보기</a>
          <a class="btn" href="/concept-graph.html">개념 지도</a>
        </div>
      </section>
      <section class="wide track-card">
        <h2>Student track</h2>
        <span class="badge track-badge">${esc(account.student_track || "general")}</span>
      </section>
      <section class="wide"><h2>Learning Memory <span class="sub">현재 ${currentMemories.length}개 표시 · 전체 ${totalMemoryCount}개</span></h2>
        ${memoryBulkControlsHTML()}
        <div class="list">${currentMemories.length ? currentMemories.map(memoryCard).join("") : '<div class="item">아직 저장된 Learning Memory가 없습니다. 설명해보기를 사용하면 여기에 쌓입니다.</div>'}</div>
        <div class="actions" style="margin-top:12px">
          <a class="btn" href="/learning-memory.html">Learning History</a>
        </div>
      </section>
      <section class="wide nursing-card ${isNursing ? 'on' : ''}"><h2>Nursing Practice Mode: Clinical Reflection</h2>
        <div class="stats">
          ${stat('saved reflections', clinicalItems.length)}
          ${stat('latest reflection', dateText(clinicalItems[0]?.created_at))}
          ${stat('mode', 'educational only')}
        </div>
        <p class="sub" style="margin-top:10px">환자 식별 정보 없이 실습 상황을 학습 자료, 개념 연결, 복습 포인트와 연결하는 교육용 회고 기능입니다.</p>
        <div class="actions" style="margin-top:12px"><a class="btn primary" href="/clinical-reflection.html">실습 회고 / Clinical Reflection</a></div>
      </section>
      `;
    refreshMemorySelectionUI();
  }
  async function generateMemoryFeedback(index){
    const item = currentMemories[index];
    const status = document.getElementById('feedbackStatus' + index);
    if(!item) return;
    if(!confirm('AI 피드백 생성은 GPT API 호출로 비용이 발생할 수 있습니다.\n계속할까요?')) return;
    if(status) status.textContent = 'AI 피드백 생성 중... API 비용이 발생할 수 있습니다.';
    try {
      await postJSON('/recall-feedback', {
        semester:item.semester,
        course:item.course,
        unit:item.unit,
        concept:item.concept,
        answer_text:item.answer_text,
        trace_id:item.id
      });
      if(status) status.textContent = 'AI 피드백을 저장했습니다.';
      await init();
    } catch(e) {
      if(status) status.textContent = 'AI 피드백을 생성하지 못했습니다: ' + e.message;
    }
  }
  async function deleteMemory(index){
    const item = currentMemories[index];
    if(!item?.id) return;
    if(!confirm('이 <내 설명> 기록을 삭제할까요?\n연결된 AI 피드백 기록도 함께 삭제됩니다.')) return;
    try {
      await deleteJSON(`/learning-memory/${encodeURIComponent(item.id)}`);
      selectedMemoryIds.delete(item.id);
      await init();
    } catch(e) {
      alert('Learning Memory를 삭제하지 못했습니다: ' + e.message);
    }
  }
  async function deleteSelectedMemories(){
    const ids = [...selectedMemoryIds];
    if(!ids.length) return;
    if(!confirm(`선택한 <내 설명> 기록 ${ids.length}개를 삭제할까요?\n연결된 AI 피드백 기록도 함께 삭제됩니다.`)) return;
    try {
      await deleteJSON('/learning-memory', { ids });
      selectedMemoryIds.clear();
      await init();
    } catch(e) {
      alert('선택한 Learning Memory를 삭제하지 못했습니다: ' + e.message);
    }
  }
  async function deleteAllMemories(){
    if(!totalMemoryCount) return;
    if(!confirm(`전체 <내 설명> 기록 ${totalMemoryCount}개를 모두 삭제할까요?\n연결된 AI 피드백 기록도 함께 삭제됩니다.`)) return;
    try {
      await deleteJSON('/learning-memory', { delete_all:true });
      selectedMemoryIds.clear();
      await init();
    } catch(e) {
      alert('전체 Learning Memory를 삭제하지 못했습니다: ' + e.message);
    }
  }
  async function init(){
    const app = document.getElementById('app');
    if(!token()) { loginGate(app, '로그인이 필요합니다.'); return; }
    try {
      const me = await getJSON('/auth/me');
      if((me.user || {}).study_enabled) document.getElementById('studyHeroBtn').style.display = 'inline-block';
      const [summary, memory, memories, due, suggest] = await Promise.all([
        getJSON('/me/summary'),
        getJSON('/learning-memory/summary'),
        getJSON('/learning-memory?limit=200').catch(()=>({ items: [] })),
        getJSON('/review/due?limit=8').catch(()=>({ items: [] })),
        getJSON('/learning/suggestions?limit=6').catch(()=>({ items: [] })),
      ]);
      let clinical = { items: [] };
      if(((me.user || {}).student_track || 'general') === 'nursing'){
        clinical = await getJSON('/clinical-reflections?limit=5').catch(()=>({ items: [] }));
      }
      render(summary, me, memory, clinical, memories, due, suggest);
    } catch(e) {
      if(e.status === 401){
        localStorage.removeItem('ln_token');
        loginGate(app, '로그인이 만료되었습니다. 다시 로그인해주세요.');
        return;
      }
      app.className='error';
      app.textContent = 'My Page를 불러오지 못했습니다: ' + e.message;
    }
  }
  init();
</script>
</body>
</html>
