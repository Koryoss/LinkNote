<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkNote · Full Knowledge Map</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; background:#fbfcfe; color:#1f2937; }
  .topbar { position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:10px; padding:12px 24px; background:rgba(255,255,255,.94); backdrop-filter:blur(6px); border-bottom:1px solid #eef1f6; }
  .brand { font-size:1.18rem; font-weight:800; color:#1e293b; text-decoration:none; }
  .spacer { flex:1; }
  .btn, button { border:1px solid #d8dee9; background:#fff; color:#2563eb; border-radius:8px; padding:8px 12px; font-size:.84rem; font-weight:700; text-decoration:none; cursor:pointer; }
  .btn.primary { background:#2563eb; border-color:#2563eb; color:#fff; }
  main { width:min(1180px, calc(100vw - 32px)); margin:24px auto 44px; }
  h1 { font-size:1.55rem; color:#0f172a; }
  h2 { font-size:1rem; margin-bottom:12px; color:#1e293b; }
  .sub { margin-top:6px; color:#64748b; font-size:.9rem; line-height:1.55; }
  .grid { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-top:18px; }
  section { background:#fff; border:1px solid #e8ebf2; border-radius:14px; padding:18px; box-shadow:0 8px 24px rgba(15,23,42,.06); }
  section.wide { grid-column:1/-1; }
  .stats { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:10px; }
  .stat { border:1px solid #eef1f6; border-radius:12px; padding:12px; background:#f8fafc; }
  .stat small { display:block; color:#64748b; font-size:.74rem; margin-bottom:5px; }
  .stat strong { font-size:1.2rem; color:#0f172a; }
  .map-cards { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:10px; margin-top:14px; }
  .map-card { text-align:left; border:1px solid #e2e8f0; background:#fff; border-radius:12px; padding:12px; color:#1f2937; }
  .map-card small { display:block; color:#64748b; font-size:.72rem; margin-bottom:5px; }
  .map-card strong { display:block; color:#0f172a; font-size:1.05rem; }
  .map-card span { display:block; margin-top:6px; color:#475569; font-size:.78rem; line-height:1.35; }
  .modebar { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
  .modebar button.active { background:#2563eb; border-color:#2563eb; color:#fff; }
  .modebar button.secondary { margin-left:auto; border-color:#cbd5e1; color:#475569; }
  .filters { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:8px; align-items:end; margin-top:14px; }
  .filters label { color:#64748b; font-size:.74rem; font-weight:700; }
  .filters input, .filters select { width:100%; border:1px solid #d8dee9; border-radius:8px; padding:8px 10px; font-size:.85rem; margin-top:4px; background:#fff; }
  .filters .check { display:flex; align-items:center; gap:8px; margin-top:22px; }
  .filters .check input { width:auto; margin:0; }
  .warning { border:1px solid #fde68a; background:#fffbeb; color:#92400e; border-radius:12px; padding:10px 12px; font-size:.84rem; line-height:1.5; margin-top:12px; }
  .graph-wrap { position:relative; height:580px; border:1px solid #eef1f6; border-radius:12px; overflow:hidden; background:radial-gradient(circle at 50% 50%, #fff, #f8fafc); }
  svg { width:100%; height:100%; display:block; }
  .edge { stroke:#cbd5e1; stroke-width:1.5; opacity:.72; }
  .edge.connected { stroke:#2563eb; opacity:.95; }
  .edge.dimmed { opacity:.2; }
  .node { cursor:pointer; }
  .node circle { fill:#eff6ff; stroke:#93c5fd; stroke-width:2; }
  .node.recalled circle { fill:#dbeafe; stroke:#2563eb; }
  .node.weak circle { fill:#fff7ed; stroke:#f97316; }
  .node.core circle { stroke:#7c3aed; }
  .node.bridge circle { stroke:#059669; }
  .node.recent circle { fill:#ecfeff; stroke:#0891b2; }
  .node.connected circle { stroke:#2563eb; stroke-width:3; }
  .node.selected circle { fill:#dbeafe; stroke:#1d4ed8; stroke-width:4; }
  .node.dimmed { opacity:.48; }
  .node text { font-size:12px; fill:#1f2937; font-weight:700; paint-order:stroke; stroke:#fff; stroke-width:3px; }
  .node.selected text { font-size:13px; }
  .badges { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
  .badge { border:1px solid #dbeafe; background:#eff6ff; color:#1d4ed8; border-radius:999px; padding:3px 8px; font-size:.72rem; font-weight:800; }
  .empty, .error { border:1px dashed #d8dee9; border-radius:12px; padding:18px; color:#64748b; background:#fff; margin-top:18px; }
  .error { border-color:#fecaca; color:#b91c1c; background:#fff7f7; }
  .detail { font-size:.88rem; line-height:1.6; }
  .detail dt { color:#64748b; font-size:.75rem; font-weight:800; margin-top:8px; }
  .detail dd { color:#111827; font-weight:700; overflow-wrap:anywhere; }
  .detail-actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .learning-actions { border:1px solid #e2e8f0; border-radius:12px; padding:12px; margin-top:14px; background:#f8fafc; }
  .learning-actions h3, .connected-list h3, .quick-search h3 { font-size:.92rem; color:#1e293b; margin-bottom:8px; }
  .connected-list, .quick-search { border-top:1px solid #eef1f6; margin-top:14px; padding-top:12px; }
  .connected-item, .search-item { border:1px solid #eef1f6; border-radius:10px; background:#fff; padding:9px 10px; margin-top:8px; }
  .connected-item strong, .search-item strong { display:block; color:#0f172a; }
  .search-meta { display:block; color:#64748b; font-size:.76rem; margin:2px 0 4px; }
  .search-status { color:#64748b; font-size:.82rem; margin-top:8px; }
  @media (max-width:860px){ .grid{grid-template-columns:1fr;} .stats,.filters,.map-cards{grid-template-columns:1fr 1fr;} .modebar button.secondary{margin-left:0;} .graph-wrap{height:520px;} }
  @media (max-width:560px){ .stats,.filters,.map-cards{grid-template-columns:1fr;} }
</style>
</head>
<body>
  <div class="topbar">
    <a class="brand" href="/">LinkNote</a>
    <span class="spacer"></span>
    <a class="btn" href="/mypage.html">My Page</a>
    <a class="btn" href="/">My Library</a>
  </div>
  <main>
    <h1>Full Knowledge Map</h1>
    <p class="sub">Learning Memory에서 더 깊게 들어가는 고급 개념 연결 지도입니다. 이 화면은 GPT/OpenAI를 호출하지 않습니다.</p>
    <div id="app" class="empty">불러오는 중...</div>
  </main>
<script>
  const configuredApi = window.LINKNOTE_API_BASE || localStorage.getItem('ln_api_base') || '';
  const API = (configuredApi || (location.protocol.startsWith('http') ? '' : 'http://127.0.0.1:8000')).replace(/\/$/, '');
  const token = () => localStorage.getItem('ln_token') || '';
  const headers = () => token() ? { Authorization:'Bearer ' + token() } : {};
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const DEFAULT_NODE_LIMIT = 12;
  const MODE_LIMITS = { review:12, core:18, connection:20, memory:18, new:18, full:80 };
  const MODE_LABELS = {
    review:'Review Map',
    core:'Core Map',
    connection:'Connection Map',
    memory:'Learning Memory Map',
    new:'New Concepts',
    full:'Full Knowledge Map'
  };
  const MODE_DESCRIPTIONS = {
    review:'지금 복습하면 좋은 개념을 우선 보여줍니다. weak score, missing links, recall 기록을 반영합니다.',
    core:'여러 개념과 연결된 중심 개념을 보여줍니다.',
    connection:'선택한 개념 주변의 직접 연결을 보여줍니다.',
    memory:'내가 설명해본 개념과 AI 피드백이 있는 개념을 보여줍니다.',
    new:'아직 내 말로 설명해본 기록이 없는 개념을 보여줍니다.',
    full:'전체 구조를 탐색하는 고급 보기입니다.'
  };
  let currentGraphData = null;
  let currentVisibleGraph = {nodes:[], edges:[]};
  let currentMode = 'review';
  let selectedConcept = '';
  let selectedNodeId = '';
  async function getJSON(path){
    const r = await fetch(API + path, { headers: headers() });
    const d = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(`${path} returned ${r.status} ${d.detail || r.statusText}`);
    return d;
  }
  const stat = (label, value) => `<div class="stat"><small>${esc(label)}</small><strong>${esc(value)}</strong></div>`;
  const TYPE_LABELS = { weak:'Weak', core:'Core', bridge:'Bridge', recent:'Recent', recalled:'Recalled', new:'New', normal:'Normal' };
  const badgeLabel = value => TYPE_LABELS[value] || value;
  const hasType = (node, type) => Array.isArray(node.node_types) && node.node_types.includes(type);
  const nodeLabel = node => String(node?.label || node?.name || '').trim();
  const score = (node, key) => Number(node?.[key] || 0);
  const topNames = (items) => items.slice(0,3).map(nodeLabel).filter(Boolean).join(' · ') || '아직 없음';
  function daysSince(value){
    if(!value) return Infinity;
    const d = new Date(value);
    if(Number.isNaN(d.getTime())) return Infinity;
    return Math.floor((Date.now() - d.getTime()) / 86400000);
  }
  function enrichNodes(nodes, edges){
    const byId = Object.fromEntries(nodes.map(node => [node.id, {...node}]));
    const neighbors = {};
    edges.forEach(edge => {
      if(!byId[edge.source] || !byId[edge.target]) return;
      (neighbors[edge.source] ||= []).push({id:edge.target, weight:Number(edge.weight || 0)});
      (neighbors[edge.target] ||= []).push({id:edge.source, weight:Number(edge.weight || 0)});
    });
    const degrees = Object.fromEntries(Object.keys(byId).map(id => [id, (neighbors[id] || []).length]));
    const degreeValues = Object.values(degrees).sort((a,b)=>b-a);
    const coreThreshold = degreeValues[Math.min(9, degreeValues.length - 1)] || 0;
    return Object.values(byId).map(node => {
      const nodeNeighbors = neighbors[node.id] || [];
      const neighborMeta = nodeNeighbors.map(n => byId[n.id]).filter(Boolean);
      const degree = nodeNeighbors.length;
      const unitSet = new Set(neighborMeta.map(n => `${n.course || ''}::${n.unit || ''}`));
      const courseSet = new Set(neighborMeta.map(n => n.course || ''));
      const weightedDegree = nodeNeighbors.reduce((sum,n)=>sum + Number(n.weight || 0), 0);
      const backendTypes = Array.isArray(node.node_types) ? node.node_types : [];
      const isWeak = backendTypes.includes('weak') || Number(node.weak_score || 0) >= 50 || Number(node.missing_links_count || 0) > 0;
      const isCore = backendTypes.includes('core') || (degree > 0 && degree >= coreThreshold);
      const isBridge = backendTypes.includes('bridge') || (degree >= 2 && (unitSet.size >= 2 || courseSet.size >= 2));
      const isRecalled = backendTypes.includes('recalled') || Number(node.recall_count || 0) > 0;
      const isRecent = backendTypes.includes('recent') || daysSince(node.last_recalled_at) <= 14;
      const nodeTypes = backendTypes.length ? backendTypes : [
        isWeak ? 'weak' : '',
        isCore ? 'core' : '',
        isBridge ? 'bridge' : '',
        isRecent ? 'recent' : '',
        isRecalled ? 'recalled' : '',
      ].filter(Boolean);
      const badges = nodeTypes.map(badgeLabel);
      return {...node, degree:node.degree ?? degree, weighted_degree:node.weighted_degree ?? weightedDegree, node_types:nodeTypes, is_weak:isWeak, is_core:isCore, is_bridge:isBridge, is_recent:isRecent, is_recalled:isRecalled, badges};
    });
  }
  function graphPriority(node){
    if(Number.isFinite(Number(node.priority_score))) return Number(node.priority_score);
    return (node.badges || []).length * 18
      + (node.is_weak ? 24 : 0)
      + (node.is_core ? 18 : 0)
      + (node.is_bridge ? 16 : 0)
      + (node.is_recent ? 14 : 0)
      + Number(node.weak_score || 0) * 0.35
      + Number(node.missing_links_count || 0) * 12
      + (Number(node.recall_count || 0) === 0 ? 20 : 0)
      + Number(node.degree || 0) * 5
      + Number(node.weight || 0) * 2;
  }
  function reviewPriority(node){
    return score(node,'review_score') * 2
      + Number(node.weak_score || 0)
      + Number(node.missing_links_count || 0) * 18
      + (Number(node.recall_count || 0) === 0 ? 20 : 0)
      + score(node,'centrality_score') * 0.15
      + score(node,'bridge_score') * 0.1;
  }
  function corePriority(node){
    return score(node,'centrality_score') * 2 + Number(node.degree || 0) * 12 + score(node,'priority_score') * 0.25;
  }
  function memoryPriority(node){
    return score(node,'memory_score') * 2 + (hasType(node,'recent') ? 30 : 0) + Number(node.recall_count || 0) * 14;
  }
  function newPriority(node){
    return score(node,'centrality_score') + Number(node.weight || 0) * 8 + Number(node.degree || 0) * 10;
  }
  function modeFromUrl(){
    const params = new URLSearchParams(location.search);
    const mode = params.get('mode') || 'review';
    currentMode = MODE_LABELS[mode] ? mode : 'review';
    selectedConcept = params.get('concept') || '';
    window._graphFilters = { course:params.get('course') || '', unit:params.get('unit') || '', weakOnly:false };
  }
  function setMode(mode, concept){
    currentMode = MODE_LABELS[mode] ? mode : 'review';
    if(concept !== undefined) selectedConcept = concept || '';
    renderGraph(currentGraphData || {nodes:[], edges:[], stats:{}});
  }
  function centerNode(node){
    if(!node) return;
    selectedNodeId = node.id || '';
    selectedConcept = nodeLabel(node);
    currentMode = 'connection';
    renderGraph(currentGraphData || {nodes:[], edges:[], stats:{}});
    const selected = (currentVisibleGraph.nodes || []).find(item => String(item.id || '') === String(selectedNodeId || '')) || findNodeById(selectedNodeId) || node;
    showDetails(selected, '선택한 개념 주변 연결을 보여줍니다.');
  }
  function centerNodeById(id){
    const node = findNodeById(id);
    centerNode(node);
  }
  function findNodeById(id){
    const nodes = Array.isArray(currentGraphData?.nodes) ? currentGraphData.nodes : [];
    return nodes.find(item => String(item.id || '') === String(id || ''));
  }
  function findNodeFromUrl(nodes){
    const params = new URLSearchParams(location.search);
    const wanted = String(params.get('concept') || '').trim().toLowerCase();
    if(!wanted) return null;
    return nodes.find(node => nodeLabel(node).toLowerCase() === wanted || String(node.id || '').toLowerCase() === wanted) || null;
  }
  function edgeRank(edge, byId){
    const connectedPriority = Math.max(graphPriority(byId[edge.source] || {}), graphPriority(byId[edge.target] || {}));
    return Number(edge.normalized_weight || 0) * 100000 + Number(edge.weight || 0) * 1000 + connectedPriority;
  }
  function limitEdgesPerNode(edges, visibleNodes, maxPerNode = 2){
    const ids = new Set(visibleNodes.map(node => node.id));
    const byId = Object.fromEntries(visibleNodes.map(node => [node.id, node]));
    const counts = {};
    const seen = new Set();
    return edges
      .filter(edge => ids.has(edge.source) && ids.has(edge.target))
      .sort((a,b)=>edgeRank(b, byId)-edgeRank(a, byId))
      .filter(edge => {
        const key = [edge.source, edge.target].sort().join('::');
        if(seen.has(key)) return false;
        if((counts[edge.source] || 0) >= maxPerNode || (counts[edge.target] || 0) >= maxPerNode) return false;
        seen.add(key);
        counts[edge.source] = (counts[edge.source] || 0) + 1;
        counts[edge.target] = (counts[edge.target] || 0) + 1;
        return true;
      });
  }
  function visibleGraph(nodes, edges){
    const enriched = enrichNodes(nodes, edges);
    let sorted = [];
    let visibleEdges = [];
    if(currentMode === 'core'){
      sorted = enriched.filter(node => hasType(node,'core') || Number(node.centrality_score || 0) >= 60).sort((a,b)=>corePriority(b)-corePriority(a));
    } else if(currentMode === 'connection'){
      const key = selectedConcept.trim().toLowerCase();
      const selected = enriched.find(node => nodeLabel(node).toLowerCase() === key || String(node.id || '').toLowerCase() === key) || enriched.sort((a,b)=>graphPriority(b)-graphPriority(a))[0];
      const neighborIds = new Set([selected?.id].filter(Boolean));
      edges.filter(edge => edge.source === selected?.id || edge.target === selected?.id)
        .sort((a,b)=>Number(b.weight || 0)-Number(a.weight || 0))
        .slice(0, MODE_LIMITS.connection - 1)
        .forEach(edge => { neighborIds.add(edge.source); neighborIds.add(edge.target); });
      sorted = enriched.filter(node => neighborIds.has(node.id)).sort((a,b)=>(a.id === selected?.id ? -1 : b.id === selected?.id ? 1 : graphPriority(b)-graphPriority(a)));
    } else if(currentMode === 'memory'){
      sorted = enriched.filter(node => hasType(node,'recalled') || hasType(node,'recent') || Number(node.recall_count || 0) > 0).sort((a,b)=>memoryPriority(b)-memoryPriority(a));
    } else if(currentMode === 'new'){
      sorted = enriched.filter(node => Number(node.recall_count || 0) === 0 || hasType(node,'new')).sort((a,b)=>newPriority(b)-newPriority(a));
    } else if(currentMode === 'full'){
      sorted = [...enriched].sort((a,b)=>graphPriority(b)-graphPriority(a));
    } else {
      sorted = enriched.filter(node => hasType(node,'weak') || Number(node.review_score || 0) > 0 || Number(node.weak_score || 0) >= 35 || Number(node.recall_count || 0) === 0)
        .sort((a,b)=>reviewPriority(b)-reviewPriority(a));
    }
    if(!sorted.length) sorted = [...enriched].sort((a,b)=>graphPriority(b)-graphPriority(a));
    const cap = MODE_LIMITS[currentMode] || DEFAULT_NODE_LIMIT;
    const visibleNodes = sorted.slice(0, currentMode === 'full' ? Math.min(cap, 120) : cap);
    visibleEdges = limitEdgesPerNode(edges, visibleNodes, currentMode === 'full' ? 3 : 2);
    return { nodes: visibleNodes, edges: visibleEdges, totalNodes:enriched.length };
  }
  function learningSummary(nodes){
    const enriched = enrichNodes(nodes, []);
    return {
      review: enriched.filter(node => hasType(node,'weak') || Number(node.review_score || 0) > 0 || Number(node.weak_score || 0) >= 35).sort((a,b)=>reviewPriority(b)-reviewPriority(a)),
      core: enriched.filter(node => hasType(node,'core') || Number(node.centrality_score || 0) >= 60).sort((a,b)=>corePriority(b)-corePriority(a)),
      recent: enriched.filter(node => hasType(node,'recent') || Number(node.recall_count || 0) > 0).sort((a,b)=>memoryPriority(b)-memoryPriority(a)),
      fresh: enriched.filter(node => Number(node.recall_count || 0) === 0 || hasType(node,'new')).sort((a,b)=>newPriority(b)-newPriority(a)),
    };
  }
  function modeButtonsHTML(){
    const primary = ['review','core','connection','memory','new'].map(mode =>
      `<button class="${currentMode===mode?'active':''}" onclick="setMode('${mode}')">${esc(MODE_LABELS[mode])}</button>`
    ).join('');
    return `<div class="modebar">${primary}<button class="secondary ${currentMode==='full'?'active':''}" onclick="setMode('full')">Explore Full Knowledge Map</button></div>`;
  }
  function uniqueSorted(items){
    return [...new Set(items.map(item => String(item || '').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b, 'ko'));
  }
  function optionHTML(items, selected, emptyLabel){
    return [`<option value="">${esc(emptyLabel)}</option>`].concat(
      items.map(item => `<option value="${esc(item)}" ${item === selected ? 'selected' : ''}>${esc(item)}</option>`)
    ).join('');
  }
  function filtersHTML(){
    const params = window._graphFilters || {};
    const nodes = Array.isArray(currentGraphData?.nodes) ? currentGraphData.nodes : [];
    const courses = uniqueSorted(nodes.map(node => node.course));
    const unitNodes = params.course ? nodes.filter(node => String(node.course || '') === params.course) : nodes;
    const units = uniqueSorted(unitNodes.map(node => node.unit));
    return `<div class="filters">
      <label>Course<select id="course" onchange="updateUnitOptions()">${optionHTML(courses, params.course || '', 'All courses')}</select></label>
      <label>Unit<select id="unit">${optionHTML(units, params.unit || '', 'All units')}</select></label>
      <label class="check"><input id="weakOnly" type="checkbox"> weak concepts only</label>
      <button onclick="loadGraph()">적용</button>
      <button onclick="clearGraphFilters()">Clear</button>
    </div>`;
  }
  function updateUnitOptions(){
    const nodes = Array.isArray(currentGraphData?.nodes) ? currentGraphData.nodes : [];
    const course = document.getElementById('course')?.value || '';
    const unitSelect = document.getElementById('unit');
    if(!unitSelect) return;
    const units = uniqueSorted((course ? nodes.filter(node => String(node.course || '') === course) : nodes).map(node => node.unit));
    unitSelect.innerHTML = optionHTML(units, '', 'All units');
  }
  function clearGraphFilters(){
    window._graphFilters = { course:'', unit:'', weakOnly:false };
    if(document.getElementById('course')) document.getElementById('course').value = '';
    if(document.getElementById('unit')) document.getElementById('unit').value = '';
    if(document.getElementById('weakOnly')) document.getElementById('weakOnly').checked = false;
    loadGraph();
  }
  function layout(nodes, width, height){
    const cx = width / 2, cy = height / 2;
    const sorted = [...nodes].sort((a,b)=>(Number(b.weak_score||0)-Number(a.weak_score||0)) || (Number(b.weight||0)-Number(a.weight||0)));
    const radius = Math.max(120, Math.min(width, height) * 0.36);
    const pos = {};
    sorted.forEach((node, i) => {
      const angle = (Math.PI * 2 * i) / Math.max(sorted.length, 1) - Math.PI / 2;
      const inner = i === 0 ? 0 : radius * (0.55 + (i % 3) * 0.16);
      pos[node.id] = {
        x: cx + Math.cos(angle) * inner,
        y: cy + Math.sin(angle) * inner,
      };
    });
    return pos;
  }
  function renderGraph(data){
    currentGraphData = data || {nodes:[], edges:[], stats:{}};
    const nodes = Array.isArray(data.nodes) ? data.nodes : [];
    const edges = Array.isArray(data.edges) ? data.edges : [];
    const visible = visibleGraph(nodes, edges);
    currentVisibleGraph = visible;
    const stats = data.stats || {};
    const summary = learningSummary(nodes);
    const modeDescription = MODE_DESCRIPTIONS[currentMode] || MODE_DESCRIPTIONS.review;
    const fullWarning = currentMode === 'full'
      ? `<div class="warning">Full Knowledge Map은 복잡할 수 있습니다. 과목/단원 필터나 개념 검색을 사용하면 더 읽기 쉽습니다. 전체 ${visible.totalNodes}개 중 상위 ${visible.nodes.length}개만 표시합니다.</div>`
      : '';
    const app = document.getElementById('app');
    app.className = 'grid';
    app.innerHTML = `
      <section class="wide"><h2>Today's Learning Map</h2>
        <p class="sub">처음에는 전체 지도를 모두 보여주지 않습니다. 지금 복습에 도움이 되는 개념만 먼저 보여줍니다.</p>
        <div class="map-cards">
          <button class="map-card" onclick="setMode('review')"><small>오늘 복습할 개념</small><strong>${esc(summary.review.length)}</strong><span>${esc(topNames(summary.review))}</span></button>
          <button class="map-card" onclick="setMode('core')"><small>중심 개념</small><strong>${esc(summary.core.length)}</strong><span>${esc(topNames(summary.core))}</span></button>
          <button class="map-card" onclick="setMode('memory')"><small>최근 설명한 개념</small><strong>${esc(summary.recent.length)}</strong><span>${esc(topNames(summary.recent))}</span></button>
          <button class="map-card" onclick="setMode('new')"><small>아직 설명 안 한 개념</small><strong>${esc(summary.fresh.length)}</strong><span>${esc(topNames(summary.fresh))}</span></button>
        </div>
      </section>
      <section class="wide"><h2>Summary</h2><div class="stats">
        ${stat('total concepts', stats.node_count || 0)}
        ${stat('total links', stats.edge_count || 0)}
        ${stat('weak concepts', stats.weak_concept_count || 0)}
        ${stat('recalled concepts', stats.recalled_concept_count || 0)}
      </div>
      ${modeButtonsHTML()}
      <p class="sub">${esc(MODE_LABELS[currentMode])}: ${esc(modeDescription)}</p>
      <p class="sub">처음에는 전체 지도를 모두 보여주지 않습니다. 복습에 도움이 되는 Weak · Core · Bridge · Recent 개념을 우선 표시합니다.</p>
      <p class="sub">현재 node ${visible.nodes.length}개 / 전체 ${nodes.length}개, edge ${visible.edges.length}개 / 전체 ${edges.length}개를 표시합니다.</p>
      ${fullWarning}
      ${filtersHTML()}</section>
      <section><h2>${esc(MODE_LABELS[currentMode])}</h2><div id="graphWrap" class="graph-wrap">${visible.nodes.length ? '<svg id="graphSvg"></svg>' : '<div class="empty">아직 표시할 Concept Connections가 없습니다. 자료를 업로드하고 개념 추출을 먼저 진행해 주세요.</div>'}</div></section>
      <section><h2>Details</h2><div id="details" class="detail">노드를 클릭하면 상세 정보가 표시됩니다.</div></section>`;
    restoreFilters();
    if(visible.nodes.length) {
      const urlNode = !selectedNodeId ? findNodeFromUrl(nodes) : null;
      if(urlNode) {
        selectedNodeId = urlNode.id || '';
        selectedConcept = nodeLabel(urlNode);
      }
      draw(visible.nodes, visible.edges);
      if(urlNode) showDetails(urlNode, currentMode === 'connection' ? '선택한 개념 주변 연결을 보여줍니다.' : '');
    }
  }
  function restoreFilters(){
    const params = window._graphFilters || {};
    if(document.getElementById('course')) document.getElementById('course').value = params.course || '';
    if(document.getElementById('unit')) document.getElementById('unit').value = params.unit || '';
    if(document.getElementById('weakOnly')) document.getElementById('weakOnly').checked = !!params.weakOnly;
  }
  function draw(nodes, edges){
    const svg = document.getElementById('graphSvg');
    const rect = svg.getBoundingClientRect();
    const width = rect.width || 760, height = rect.height || 560;
    svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
    const pos = layout(nodes, width, height);
    const byId = Object.fromEntries(nodes.map(node => [node.id, node]));
    const labelVisibleIds = new Set(
      [...nodes]
        .sort((a,b)=>graphPriority(b)-graphPriority(a))
        .slice(0, currentMode === 'full' ? 10 : 8)
        .map(node => node.id)
    );
    if(selectedNodeId) labelVisibleIds.add(selectedNodeId);
    const connectedIds = new Set();
    if(selectedNodeId) {
      edges.forEach(edge => {
        if(edge.source === selectedNodeId || edge.target === selectedNodeId) {
          connectedIds.add(edge.source);
          connectedIds.add(edge.target);
        }
      });
    }
    const edgeLines = edges.map(edge => {
      const a = pos[edge.source], b = pos[edge.target];
      if(!a || !b) return '';
      const width = 1 + Math.min(1.2, Number(edge.normalized_weight || edge.weight || 0) / 100);
      const connected = selectedNodeId && (edge.source === selectedNodeId || edge.target === selectedNodeId);
      const dimmed = selectedNodeId && !connected;
      const cls = ['edge', connected ? 'connected' : '', dimmed ? 'dimmed' : ''].filter(Boolean).join(' ');
      return `<line class="${cls}" data-source="${esc(edge.source)}" data-target="${esc(edge.target)}" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke-width="${width}"><title>${esc(edge.reason || '')}</title></line>`;
    }).join('');
    const nodeEls = nodes.map(node => {
      const p = pos[node.id] || {x:width/2,y:height/2};
      const isSelected = selectedNodeId && node.id === selectedNodeId;
      const isConnected = selectedNodeId && connectedIds.has(node.id);
      const isDimmed = selectedNodeId && !isSelected && !isConnected;
      const cls = ['node', node.is_weak ? 'weak' : '', node.is_recalled ? 'recalled' : '', node.is_core ? 'core' : '', node.is_bridge ? 'bridge' : '', node.is_recent ? 'recent' : '', isSelected ? 'selected' : '', isConnected && !isSelected ? 'connected' : '', isDimmed ? 'dimmed' : ''].filter(Boolean).join(' ');
      const r = Math.max(18, Math.min(38, 18 + Number(node.weight || 1) * 2));
      const label = labelVisibleIds.has(node.id) ? `<text text-anchor="middle" y="4">${esc(String(node.label || '').slice(0, 14))}</text>` : '';
      return `<g class="${cls}" data-id="${esc(node.id)}" transform="translate(${p.x},${p.y})"><title>${esc(nodeLabel(node) || node.id)}</title><circle r="${r}"></circle>${label}</g>`;
    }).join('');
    svg.innerHTML = edgeLines + nodeEls;
    svg.querySelectorAll('.node').forEach(el => {
      el.addEventListener('mouseenter', () => markGraphFocus(el.dataset.id));
      el.addEventListener('mouseleave', () => markGraphFocus(selectedNodeId));
      el.addEventListener('click', () => selectNode(byId[el.dataset.id]));
    });
    markGraphFocus(selectedNodeId);
  }
  function markGraphFocus(nodeId){
    const svg = document.getElementById('graphSvg');
    if(!svg) return;
    const focused = String(nodeId || '');
    const connectedIds = new Set();
    svg.querySelectorAll('.edge').forEach(el => {
      if(focused && (el.dataset.source === focused || el.dataset.target === focused)){
        connectedIds.add(el.dataset.source);
        connectedIds.add(el.dataset.target);
      }
    });
    svg.querySelectorAll('.node').forEach(el => {
      const id = el.dataset.id;
      const connected = !!focused && connectedIds.has(id);
      el.classList.toggle('connected', !!focused && connected && id !== focused);
      el.classList.toggle('selected', !!focused && id === focused);
      el.classList.toggle('dimmed', !!focused && id !== focused && !connected);
    });
    svg.querySelectorAll('.edge').forEach(el => {
      const connected = !!focused && (el.dataset.source === focused || el.dataset.target === focused);
      el.classList.toggle('connected', connected);
      el.classList.toggle('dimmed', !!focused && !connected);
    });
  }
  function selectNode(node){
    if(!node) return;
    selectedNodeId = node.id || '';
    selectedConcept = nodeLabel(node);
    draw(currentVisibleGraph.nodes || [], currentVisibleGraph.edges || []);
    showDetails(node);
  }
  function connectedConceptsHTML(node){
    const visibleNodes = currentVisibleGraph.nodes || [];
    const visibleEdges = currentVisibleGraph.edges || [];
    const byId = Object.fromEntries(visibleNodes.map(item => [item.id, item]));
    const rows = visibleEdges
      .filter(edge => edge.source === node.id || edge.target === node.id)
      .sort((a,b)=>Number(b.weight || b.normalized_weight || 0)-Number(a.weight || a.normalized_weight || 0))
      .slice(0, 8)
      .map(edge => {
        const other = byId[edge.source === node.id ? edge.target : edge.source];
        if(!other) return '';
        const scoreValue = edge.normalized_weight ?? edge.weight ?? edge.score ?? '';
        const scoreText = scoreValue === '' ? '' : ` · ${esc(scoreValue)}`;
        const reason = edge.reason || edge.edge_type || '저장된 개념 연결';
        return `<div class="connected-item"><strong>${esc(nodeLabel(other) || other.id)}</strong><span class="search-meta">${esc(edge.edge_type || 'edge')}${scoreText}</span>${esc(reason)}</div>`;
      })
      .filter(Boolean)
      .join('');
    return `<div class="connected-list"><h3>Concept Connections</h3>${rows || '<div class="search-item">현재 표시된 연결 개념이 없습니다. 이 개념 중심으로 보기를 눌러 주변 연결을 확인해보세요.</div>'}</div>`;
  }
  function searchResultsHTML(d){
    const list = (items, empty, renderItem) => items && items.length ? items.map(renderItem).join('') : `<div class="search-item">${esc(empty)}</div>`;
    return `<div class="quick-search"><h3>빠른 검색 결과</h3>
      <p class="sub">빠른 검색: GPT 답변 생성 없음 · ${esc(d.from_cache ? '캐시 결과' : '새 검색')}</p>
      <div class="search-card"><h4>관련 개념</h4>${list(d.related_concepts, '관련 개념을 찾지 못했습니다.', x=>`<div class="search-item"><strong>${esc(x.concept || '개념')}</strong><span class="search-meta">${esc(x.course || '')} · ${esc(x.unit || '')}</span>${esc(x.reason || '')}</div>`)}</div>
      <div class="search-card"><h4>관련 자료 / Chunk</h4>${list(d.sources, '관련 chunk를 찾지 못했습니다.', x=>`<div class="search-item"><strong>${esc(x.filename || '파일명 없음')}</strong><span class="search-meta">${esc(x.course || '')} · ${esc(x.unit || '')} · p.${esc(x.page || '-')} · score ${esc(x.score || 0)}</span>${esc(x.chunk_preview || '')}</div>`)}</div>
      <div class="search-card"><h4>Learning Memory / Recall</h4>${list(d.learning_memory_matches, '관련 Learning Memory/Recall 기록이 없습니다.', x=>`<div class="search-item"><strong>${esc(x.concept || '개념')}</strong><span class="search-meta">${esc(x.course || '')} · ${esc(x.unit || '')} · ${esc(x.created_at || '')}</span>${esc(x.improved_summary || x.answer_preview || '')}</div>`)}</div>
    </div>`;
  }
  async function quickSearchNode(id){
    const node = findNodeById(id);
    if(!node) return;
    const target = document.getElementById('quickSearchResults');
    if(!target) return;
    target.innerHTML = '<p class="search-status">관련 자료 검색 중...</p>';
    const search_filter = {};
    if(node.course) search_filter.course = node.course;
    if(node.unit) search_filter.unit = node.unit;
    try{
      const r = await fetch(API + '/ask/search', {
        method:'POST',
        headers:{...headers(), 'Content-Type':'application/json'},
        body:JSON.stringify({
          question:`${nodeLabel(node)} 관련 자료 찾아줘`,
          scope:Object.keys(search_filter).length ? 'single' : 'multi',
          search_filter,
          limit:3
        })
      });
      const d = await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(d.detail || r.statusText);
      target.innerHTML = searchResultsHTML(d);
    }catch(e){
      target.innerHTML = `<div class="error">빠른 검색 실패: ${esc(e.message || e)}</div>`;
    }
  }
  function showDetails(node, notice=''){
    if(!node) return;
    const badges = (node.badges || []).length ? `<div class="badges">${node.badges.map(b=>`<span class="badge">${esc(b)}</span>`).join('')}</div>` : '<div class="sub">분류 badge가 아직 없습니다.</div>';
    const why = Array.isArray(node.why_shown) && node.why_shown.length ? `<ul>${node.why_shown.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>` : '-';
    const concept = encodeURIComponent(nodeLabel(node));
    const course = encodeURIComponent(node.course || '');
    const unit = encodeURIComponent(node.unit || '');
    const galleryUrl = `/?course=${course}&unit=${unit}`;
    const recallUrl = `/?course=${course}&unit=${unit}&concept=${concept}&action=recall`;
    document.getElementById('details').innerHTML = `<dl>
      <dt>Concept</dt><dd>${esc(node.label || '')}</dd>
      <dt>Type</dt><dd>${badges}</dd>
      <dt>Course / Unit</dt><dd>${esc(node.course || '-')} · ${esc(node.unit || '-')}</dd>
      <dt>Recall Count</dt><dd>${esc(node.recall_count || 0)}</dd>
      <dt>Missing Links</dt><dd>${esc(node.missing_links_count || 0)}</dd>
      <dt>Weak Score</dt><dd>${esc(node.weak_score || 0)}</dd>
      <dt>Priority Score</dt><dd>${esc(node.priority_score || 0)}</dd>
      <dt>Degree</dt><dd>${esc(node.degree || 0)}</dd>
      <dt>Last Recalled</dt><dd>${esc(node.last_recalled_at || '-')}</dd>
      <dt>Why Shown</dt><dd>${why}</dd>
      <dt>Recommended Action</dt><dd>${esc(node.recommended_action || '관련 자료를 빠른 검색으로 다시 확인해보세요.')}</dd>
    </dl>
    ${notice ? `<div class="warning">${esc(notice)}</div>` : ''}
    <div class="learning-actions">
      <h3>Learning Actions</h3>
      <div class="detail-actions">
        <button onclick="centerNodeById('${esc(node.id)}')">이 개념 중심으로 보기</button>
        <a class="btn" href="/learning-memory.html?concept=${concept}&course=${course}&unit=${unit}">Learning Memory 보기</a>
        <button onclick="quickSearchNode('${esc(node.id)}')">관련 자료 빠른 검색</button>
        <a class="btn" href="${galleryUrl}">관련 단원 열기</a>
        <a class="btn" href="${recallUrl}">설명해보기</a>
      </div>
      <p class="sub">빠른 검색: GPT 답변 생성 없음</p>
      <div id="quickSearchResults"></div>
    </div>
    ${connectedConceptsHTML(node)}`;
  }
  async function loadGraph(){
    const saved = window._graphFilters || {};
    const courseEl = document.getElementById('course');
    const unitEl = document.getElementById('unit');
    const weakEl = document.getElementById('weakOnly');
    const course = courseEl ? courseEl.value.trim() : (saved.course || '');
    const unit = unitEl ? unitEl.value.trim() : (saved.unit || '');
    const weakOnly = weakEl ? !!weakEl.checked : !!saved.weakOnly;
    window._graphFilters = { course, unit, weakOnly };
    const params = new URLSearchParams();
    if(course) params.set('course', course);
    if(unit) params.set('unit', unit);
    if(weakOnly) params.set('weak_only', 'true');
    const data = await getJSON('/concept-graph/overview' + (params.toString() ? '?' + params.toString() : ''));
    renderGraph(data);
  }
  async function init(){
    const app = document.getElementById('app');
    if(!token()) { app.className='error'; app.textContent='로그인이 필요합니다. Gallery에서 먼저 로그인해주세요.'; return; }
    modeFromUrl();
    try { await loadGraph(); }
    catch(e){ app.className='error'; app.textContent='Full Knowledge Map을 불러오지 못했습니다: ' + e.message; }
  }
  init();
</script>
</body>
</html>
