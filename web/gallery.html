<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkNote · My Library</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; background: #fbfcfe; color: #1f2937; }
  .topbar {
    position: sticky; top: 0; z-index: 30; display: flex; align-items: center; gap: 14px;
    padding: 12px 24px; background: rgba(255,255,255,0.92); backdrop-filter: blur(6px);
    border-bottom: 1px solid #eef1f6;
  }
  .topbar .brand { font-size: 1.35rem; font-weight: 700; white-space: nowrap; }
  .topbar input { border: 1px solid #d8dee9; border-radius: 8px; padding: 7px 10px; font-size: 0.85rem; width: 120px; }
  .topbar button { border: 1px solid #2563eb; background: #2563eb; color: #fff; border-radius: 8px; padding: 7px 14px; font-size: 0.85rem; cursor: pointer; }

  .hero { margin: 18px 24px 0; padding: 22px 26px; border: 1px solid #e3eafc; border-radius: 16px;
    background: linear-gradient(135deg, #eef4ff 0%, #f7f9ff 60%, #fff 100%); }
  .hero h1 { font-size: 1.5rem; color: #1e293b; }
  .hero p { font-size: 0.92rem; color: #64748b; margin-top: 6px; }

  .layout { display: grid; grid-template-columns: 360px 1fr; gap: 20px; margin: 20px 24px 0; }
  .sidebar { position: sticky; top: 20px; align-self: start; background: #fff; border: 1px solid #e8ebf2; border-radius: 18px; padding: 20px; box-shadow: 0 16px 36px rgba(15,23,42,0.08); min-height: 520px; }
  .sidebar .panel { margin-bottom: 22px; }
  .sidebar .panel-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; font-size: 0.95rem; font-weight: 700; color: #1f2937; }
  .sidebar .panel-header button { border: none; background: #2563eb; color: #fff; border-radius: 12px; padding: 8px 12px; cursor: pointer; font-size: 0.84rem; }
  .sidebar .timetable-item { margin-bottom: 14px; }
  .sidebar .timetable-item strong { display: block; margin-bottom: 6px; color: #0f172a; }
  .sidebar .timetable-item div { font-size: 0.86rem; color: #475569; line-height: 1.5; }
  .sidebar .confirm-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.88rem; }
  .sidebar .confirm-line span:first-child { color: #64748b; }
  .sidebar .confirm-line span:last-child { font-weight: 700; color: #1f2937; }
  .sidebar button.refresh { width: 100%; }
  .content { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }

  .crumbs { margin: 0 0 12px; font-size: 0.82rem; color: #64748b; display: flex; align-items: center; gap: 8px; }
  .crumbs a { color: #2563eb; cursor: pointer; text-decoration: none; }
  .crumbs .crumb { display:inline-flex; align-items:center; padding:7px 14px; border-radius:9px; font-size:0.85rem; font-weight:600; text-decoration:none; }
  .crumbs .crumb.link { background:#2563eb; color:#fff; cursor:pointer; border:1px solid #2563eb; }
  .crumbs .crumb.link:hover { background:#1d4ed8; }
  .crumbs .crumb.plain { background:#fff; color:#1f2937; border:1px solid #d8dee9; }
  .crumbs .crumb-sep { color:#cbd5e1; }
  .crumbs .crumb.has-menu { cursor:pointer; }
  .crumbs .crumb.has-menu::after { content:'▾'; color:#94a3b8; margin-left:6px; font-size:0.75rem; }
  .crumb-menu { position:fixed; z-index:80; background:#fff; border:1px solid #e5e7eb; border-radius:12px;
    box-shadow:0 14px 36px rgba(15,23,42,0.18); padding:6px; min-width:150px; }
  .crumb-menu-item { padding:9px 12px; border-radius:8px; font-size:0.88rem; color:#1f2937; cursor:pointer; white-space:nowrap; }
  .crumb-menu-item:hover { background:#f1f5ff; }
  .crumb-menu-item.on { font-weight:700; color:#2563eb; }
  .banner { margin: 0 0 6px; padding: 10px 14px; border-radius: 10px; font-size: 0.8rem;
    background: #fff7ed; border: 1px solid #fed7aa; color: #9a3412; display: none; }

  .section-title { margin: 22px 24px 6px; font-size: 0.95rem; font-weight: 700; }
  .muted { color: #94a3b8; font-weight: 500; font-size: 0.8rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 18px; padding: 8px 24px 32px; }
  .card { background: #fff; border: 1px solid #e8ebf2; border-radius: 16px; padding: 20px; cursor: pointer;
    min-height: 116px; box-shadow: 0 2px 10px rgba(15,23,42,0.05);
    transition: transform .16s, box-shadow .16s, border-color .16s; display: flex; flex-direction: column; justify-content: space-between; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 12px 26px rgba(15,23,42,0.12); border-color: #c7d6ff; }
  .card .ctag { font-size: 0.7rem; font-weight: 700; color: #2563eb; letter-spacing: .03em; }
  .card .ctitle { font-size: 1.08rem; font-weight: 700; margin-top: 8px; color: #1e293b; word-break: keep-all; }
  .card .cmeta { font-size: 0.76rem; color: #9ca3af; margin-top: 14px; }
  .empty { margin: 10px 24px 30px; padding: 26px; border: 1px dashed #d8dee9; border-radius: 14px; color: #6b7280; font-size: 0.86rem; background:#fff; }

  #canvas { position: relative; height: 470px; border: 1px solid #eef1f6; border-radius: 0 0 16px 16px; background:#fff; overflow: hidden; }
  #canvas svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .unit-cols { display:flex; gap:14px; margin:8px 16px 30px; align-items:flex-start; }
  .unit-main { flex:1; min-width:0; }
  .unit-main .iq { margin:0; }
  .doc-panel { flex:0 0 400px; height:calc(100vh - 170px); min-height:520px; overflow:hidden; border:1px solid #eef1f6; border-radius:14px; background:#fff; display:flex; flex-direction:column; }
  .unit-cols.doc-collapsed .doc-panel { flex-basis:210px; height:44px; min-height:44px; overflow:hidden; }
  .unit-cols.doc-collapsed .doc-panel .doc-frame { display:none; }
  .unit-cols.doc-collapsed .doc-panel select { display:none; }
  .unit-cols.doc-collapsed .unit-main { width:100%; }
  .doc-head { position:sticky; top:0; background:#f8fafc; border-bottom:1px solid #eef1f6; padding:10px 14px; font-weight:700; font-size:0.85rem; }
  .doc-title { margin-right:auto; }
  .doc-body { padding:10px 14px; font-size:0.8rem; line-height:1.5; color:#334155; }
  .doc-file { font-weight:700; color:#1e293b; margin:10px 0 4px; font-size:0.82rem; }
  .doc-pg { color:#2563eb; font-weight:600; font-size:0.74rem; margin:8px 0 2px; }
  .doc-tx { white-space:pre-wrap; margin-bottom:6px; }
  .unit-cols .unit-main { order:1; }
  .unit-cols .doc-panel { order:2; }
  .unit-cols.doc-collapsed .doc-panel .clinical-panel { display:none; }
  .unit-cols.doc-collapsed .doc-panel .doc-tab { display:none; }
  .doc-tab { border:1px solid #d8dee9; background:#fff; color:#475569; border-radius:6px; padding:3px 8px; font-size:.72rem; cursor:pointer; font-weight:600; }
  .doc-tab.on { border-color:#2563eb; color:#2563eb; background:#eff6ff; }
  .clinical-panel { flex:1 1 auto; min-height:0; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; font-size:.8rem; background:#fff; }
  .clinical-panel[hidden] { display:none; }
  .clinical-panel textarea { width:100%; border:1px solid #d8dee9; border-radius:8px; padding:8px 10px; font-size:.8rem; font-family:inherit; resize:vertical; box-sizing:border-box; }
  .clin-note { background:#fff7ed; border:1px solid #fed7aa; color:#9a3412; border-radius:8px; padding:8px 10px; line-height:1.5; font-size:.72rem; }
  .clin-row { display:flex; align-items:center; gap:8px; }
  .clin-btn { border:1px solid #2563eb; background:#2563eb; color:#fff; border-radius:8px; padding:6px 12px; font-size:.78rem; cursor:pointer; font-weight:700; }
  .clin-btn:disabled { opacity:.45; cursor:default; }
  .clin-card { border:1px solid #e8ebf2; border-radius:10px; padding:10px; background:#f8fafc; line-height:1.55; }
  .clin-card .k { color:#64748b; font-size:.72rem; display:block; margin-top:8px; }
  .clin-card .k:first-child { margin-top:0; }
  .clin-strength { display:inline-block; border-radius:999px; padding:2px 10px; font-weight:800; font-size:.72rem; }
  .clin-strength.s강 { background:#dcfce7; color:#15803d; }
  .clin-strength.s중 { background:#fef9c3; color:#a16207; }
  .clin-strength.s약 { background:#ffedd5; color:#c2410c; }
  .clin-strength.s미확인 { background:#f1f5f9; color:#64748b; }
  .clin-src { border:1px solid #eef1f6; background:#fff; border-radius:8px; padding:5px 8px; font-size:.72rem; color:#475569; margin-top:4px; }
  .clin-saved-head { font-weight:700; color:#1e293b; margin-top:6px; font-size:.78rem; }
  .clin-item { border:1px solid #eef1f6; border-radius:8px; padding:8px 24px 8px 10px; background:#fff; position:relative; margin-top:4px; line-height:1.5; }
  .clin-item .del { position:absolute; top:6px; right:6px; border:none; background:none; color:#94a3b8; cursor:pointer; font-size:.9rem; }
  @media (max-width:900px){ .unit-cols{flex-direction:column;} .doc-panel{flex:1 1 auto; width:100%; height:min(62vh,520px); min-height:320px;} }
  .line { stroke: #cbd5e1; stroke-width: 2; opacity: 0.4; }
  .line.active { stroke: #2563eb; opacity: 0.95; stroke-width: 2.5; }
  .node { position: absolute; transform: translate(-50%,-50%); background: #fff; border: 1px solid #e5e7eb;
    border-radius: 11px; padding: 9px 12px; cursor: grab; box-shadow: 0 2px 10px rgba(15,23,42,0.06);
    transition: opacity .2s, box-shadow .18s, border-color .18s; white-space: nowrap;
    animation: pop .4s cubic-bezier(.2,.7,.3,1) both; }
  .node:hover { box-shadow: 0 8px 22px rgba(15,23,42,0.14); }
  .node.dragging { cursor: grabbing; box-shadow: 0 14px 32px rgba(15,23,42,0.20); transition: none; z-index: 5; }
  .node .nm { font-weight: 700; } .node .pg { font-size: 0.66rem; color: #9ca3af; margin-top: 2px; }
  .node.core { border-color:#c7d6ff; background:linear-gradient(135deg,#f3f7ff,#fff); } .node.core .nm { color:#1e3a8a; }
  .node.recall-none { border-color:#d1d5db; background:#f8fafc; color:#475569; }
  .node.recall-none .nm { color:#475569; }
  .node.recall-1 { border-color:#bfdbfe; background:#eff6ff; }
  .node.recall-2 { border-color:#93c5fd; background:#dbeafe; }
  .node.recall-3 { border-color:#60a5fa; background:#bfdbfe; }
  .node.recall-4 { border-color:#2563eb; background:#2563eb; color:#fff; box-shadow:0 0 0 2px rgba(37,99,235,0.16); }
  .node.recall-4 .nm, .node.recall-4 .pg { color:#fff; }
  .node .state-badge { position:absolute; left:50%; bottom:-18px; transform:translateX(-50%); white-space:nowrap;
    border:1px solid #cbd5e1; background:#fff; color:#475569; border-radius:999px; padding:1px 6px; font-size:0.62rem; font-weight:700; }
  .node.recall-1 .state-badge, .node.recall-2 .state-badge, .node.recall-3 .state-badge { border-color:#bfdbfe; color:#1d4ed8; background:#eff6ff; }
  .node.recall-4 .state-badge { border-color:#2563eb; color:#1d4ed8; background:#eff6ff; }
  .group-hub { position:absolute; transform:translate(-50%,-50%); background:#eef2ff; color:#3730a3; border:1px solid #c7d2fe; border-radius:999px; padding:3px 10px; font-size:0.72rem; font-weight:700; pointer-events:none; z-index:1; white-space:nowrap; }
  .line.group-line { stroke:#c7d2fe; stroke-dasharray:4 4; }
  .view-controls select, .view-controls button { height:38px; box-sizing:border-box; line-height:1.2; }
  .iq-row input, .iq-row select, .iq-row button { height:38px; box-sizing:border-box; }
  .doc-frame { width:100%; flex:1 1 auto; min-height:0; border:0; display:block; background:#f8fafc; }
  .doc-head { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .doc-head select { max-width:150px; border:1px solid #d8dee9; border-radius:6px; padding:3px 6px; font-size:0.72rem; }
  .mini-btn { border:1px solid #d8dee9; background:#fff; color:#475569; border-radius:6px; padding:3px 8px; font-size:0.72rem; cursor:pointer; margin-left:8px; font-weight:600; }
  .mini-btn:hover { border-color:#2563eb; color:#2563eb; }
  .drill-bar { display:flex; align-items:center; gap:8px; margin:14px 0; }
  .graph-panel { margin:12px 0; border-radius:16px; background:#fff; }
  .graph-head { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 12px; border:1px solid #eef1f6; border-bottom:0; border-radius:16px 16px 0 0; background:#f8fafc; }
  .graph-title { font-size:0.85rem; font-weight:700; color:#1f2937; }
  .graph-tools { position:absolute; top:12px; right:12px; z-index:10; display:flex; flex-direction:column; gap:7px; align-items:stretch; }
  .graph-tools .mini-btn { margin-left:0; background:rgba(255,255,255,0.94); box-shadow:0 6px 16px rgba(15,23,42,0.08); }
  .graph-panel.graph-collapsed #canvas { display:none; }
  .node.has-more { box-shadow:0 0 0 2px #dbeafe; }
  .node .more { position:absolute; top:-6px; right:-6px; width:14px; height:14px; line-height:13px; text-align:center; background:#2563eb; color:#fff; border-radius:50%; font-size:10px; font-weight:700; }
  .mini-sel { height:30px; border:1px solid #d8dee9; border-radius:8px; padding:0 8px; font-size:0.8rem; cursor:pointer; }
  .card[draggable="true"] { cursor:grab; }
  .card.dragging { opacity:.45; }
  .node.dim { opacity: 0.22; } .node.active { border-color:#2563eb; box-shadow:0 8px 26px rgba(37,99,235,0.22); }
  .w5 .nm{font-size:1.02rem;} .w4 .nm{font-size:0.92rem;} .w3 .nm{font-size:0.84rem;} .w2 .nm{font-size:0.76rem;}
  .badge-demo { display:inline-block; font-size:0.7rem; color:#9a3412; background:#fff7ed; border:1px solid #fed7aa; border-radius:999px; padding:2px 9px; margin-left:8px; }

  /* 등장 애니메이션 */
  @keyframes rise { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform: translateY(0); } }
  @keyframes pop  { from { opacity:0; transform: translate(-50%,-50%) scale(.82); } to { opacity:1; transform: translate(-50%,-50%) scale(1); } }
  .card { opacity: 0; animation: rise .42s ease both; }
  .grid .card:nth-child(1){animation-delay:.00s} .grid .card:nth-child(2){animation-delay:.05s}
  .grid .card:nth-child(3){animation-delay:.10s} .grid .card:nth-child(4){animation-delay:.15s}
  .grid .card:nth-child(5){animation-delay:.20s} .grid .card:nth-child(6){animation-delay:.25s}
  .grid .card:nth-child(7){animation-delay:.30s} .grid .card:nth-child(8){animation-delay:.35s}
  .grid .card:nth-child(n+9){animation-delay:.40s}

  /* 호버 툴팁 */
  #tip { position: fixed; z-index: 60; pointer-events: none; opacity: 0; transform: translateY(4px);
    transition: opacity .14s, transform .14s; background: #111827; color: #fff; font-size: 0.78rem;
    padding: 8px 11px; border-radius: 9px; box-shadow: 0 8px 22px rgba(0,0,0,0.25); max-width: 240px; line-height: 1.45; }
  #tip.on { opacity: 1; transform: translateY(0); }
  #tip .t-nm { font-weight: 700; } #tip .t-meta { color: #cbd5e1; margin-top: 2px; }

  /* 시간표를 보조로: 기본은 My Library 전면, 토글 시 사이드바 표시 */
  .topbar button.ghost { background:#fff; color:#2563eb; }
  .layout.collapsed { grid-template-columns: 1fr; }
  .layout.collapsed .sidebar { display:none; }

  /* 미술관 액자 벽 */
  .wall { display:flex; flex-direction:column; gap:14px; padding:20px 0 8px; width:100%; }
  .shelf-row { }
  .shelf-items { display:flex; justify-content:center; align-items:flex-end; flex-wrap:wrap; gap:20px 22px; padding:0 24px; }
  .shelf-board { height:14px; margin:6px 30px 0; border-radius:0 0 5px 5px;
    background:linear-gradient(180deg,#e4d6ba 0%, #d2bd96 60%, #c0a87e 100%);
    box-shadow:0 14px 20px -12px rgba(70,48,12,.5), inset 0 -2px 3px rgba(0,0,0,.10); }
  /* 책장 선반은 전체화면(넓은 창)에서만 표시, 창 줄이면 숨김 */
  @media (max-width: 1199px){ .shelf-board { display:none; } }
  .wall-shelf { height:0; border-bottom:3px solid #ece7df; margin:0 26px 34px;
    box-shadow:0 14px 22px -16px rgba(0,0,0,.35); }
  .home-main { display:flex; gap:22px; align-items:flex-start; flex-wrap:wrap; }
  .course-sidebox { width:320px; min-width:280px; background:#fff; border:1px solid #e8ebf2; border-radius:18px; padding:18px; box-shadow:0 14px 32px rgba(15,23,42,0.08); }
  .course-sidebox .section-title { margin:0 0 12px; font-size:0.95rem; }
  .course-sidebox .course-list { display:flex; flex-direction:column; gap:10px; }
  .course-sidebox .course-item { padding:10px 12px; border:1px solid #e5e7eb; border-radius:12px; cursor:pointer; transition:background .16s, border-color .16s; }
  .course-sidebox .course-item:hover { background:#f8fbff; border-color:#cfe3ff; }
  .course-sidebox .course-item.active { background:#eff6ff; border-color:#93c5fd; }
  .course-sidebox .course-item span { display:block; font-weight:700; color:#1f2937; }
  .course-sidebox .course-item small { color:#64748b; margin-top:4px; }
  .art-frame { cursor:pointer; background:#ffffff; padding:12px 12px 10px;
    border:1px solid #e7e0d4; border-radius:4px;
    box-shadow:0 12px 24px -12px rgba(0,0,0,.4), inset 0 0 0 6px #fff;
    transition:transform .16s, box-shadow .16s, border-color .16s; animation:rise .42s ease both; }
  .art-frame.active { border-color:#2563eb; box-shadow:0 20px 34px -14px rgba(37,99,235,.25), inset 0 0 0 6px #fff; }
  .art-frame:hover { transform:translateY(-6px);
    box-shadow:0 22px 38px -14px rgba(0,0,0,.45), inset 0 0 0 6px #fff; }
  .art-canvas { border-radius:2px; box-shadow: inset 0 0 0 1px rgba(0,0,0,.06); }
  .art-mat { background:#faf7f1; padding:10px; border-radius:4px; box-shadow: inset 0 0 0 4px #fff; }
  .art-label { text-align:center; margin-top:10px; }
  .art-title { font-weight:700; color:#1f2937; font-size:0.88rem; line-height:1.25; word-break:keep-all; overflow-wrap:anywhere; max-width:160px;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .art-sub { font-size:0.72rem; color:#9b8e79; margin-top:3px; }
  .sz-l .art-canvas{ width:168px; height:126px; } .sz-m .art-canvas{ width:138px; height:104px; }
  .sz-s .art-canvas{ width:112px; height:84px; }

  /* 시간표 추가 폼 */
  .tt-add { margin-top:14px; border-top:1px solid #eef1f6; padding-top:12px; }
  .tt-add summary { cursor:pointer; font-size:0.86rem; font-weight:700; color:#2563eb; }
  .tt-form { display:flex; flex-direction:column; gap:8px; margin-top:10px; }
  .tt-form input { border:1px solid #d8dee9; border-radius:8px; padding:7px 9px; font-size:0.82rem; }
  .tt-form button { border:none; background:#2563eb; color:#fff; border-radius:8px; padding:8px; cursor:pointer; font-size:0.84rem; }
  .tt-form .tt-del { background:#fff; color:#ef4444; border:1px solid #fecaca; }
  .tt-status { font-size:0.78rem; color:#16a34a; min-height:1em; }
  .tt-days { display:flex; flex-wrap:wrap; gap:6px; margin:2px 0; }
  .tt-days input { display:none; }
  .tt-days label { width:38px; text-align:center; padding:7px 0; border:1px solid #d8dee9; border-radius:8px;
    font-size:0.85rem; color:#475569; cursor:pointer; transition:background .12s, color .12s, border-color .12s; }
  .tt-days label:hover { border-color:#bcd0ff; }
  .tt-days label:has(input:checked) { background:#2563eb; color:#fff; border-color:#2563eb; font-weight:600; }

  /* 시간표 주간 격자 */
  .tt-sem { font-weight:700; font-size:0.82rem; margin:12px 0 6px; color:#0f172a; }
  .tt-grid { width:100%; border-collapse:collapse; table-layout:fixed; font-size:10.5px; }
  .tt-grid th, .tt-grid td { border:1px solid #e5e7eb; padding:3px; vertical-align:middle;
    white-space:normal; word-break:break-word; overflow-wrap:anywhere; }
  .tt-grid td[rowspan] { background:#f7faff; }
  .tt-grid th { background:#f3f4f6; color:#374151; text-align:center; font-weight:700; }
  .tt-grid .tt-time { width:30px; color:#6b7280; background:#fafafa; font-size:9px; text-align:center; }
  .tt-cell { background:#eef6ff; border-radius:5px; padding:4px 5px; margin-bottom:3px; color:#1f2937;
    line-height:1.25; display:flex; justify-content:space-between; gap:4px; align-items:flex-start; }
  .tt-cell span { font-weight:600; flex:1; overflow-wrap:anywhere; }
  .tt-cell i { cursor:pointer; color:#b6c2d4; font-style:normal; font-weight:700; }
  .tt-cell i:hover { color:#ef4444; }
  .tt-cell i.edit:hover { color:#2563eb; }

<script>
  // 같은 서버가 화면을 서빙하면 상대경로(웹/데스크톱), 파일로 직접 열면 로컬 서버로 폴백
  const API = location.protocol.startsWith('http') ? '' : 'http://127.0.0.1:8000';
  let state = { page: 'home', semester: null, course: null, unit: null };
  let sessionUser = null;

  const DEMO = {
    library: { total_chunks: 0, semesters: [
      { semester: "2026-1", courses: [
        { course: "병태생리학 1", files: [{filename:"예시.pdf", title:"예시"}] },
        { course: "인체 구조와 기능 2", files: [{filename:"예시.pdf", title:"예시"}] },
      ]},
    ]},
    units: {
      "병태생리학 1": [
        { unit: "관상동맥질환, 울혈성 심부전", file_count: 1, page_count: 12 },
        { unit: "급성 신부전, 만성 신부전", file_count: 1, page_count: 8 },
      ],
      "인체 구조와 기능 2": [ { unit: "신경계", file_count: 1, page_count: 10 } ],
    },
    concepts: {
      "급성 신부전, 만성 신부전": [
        { name:"신부전", weight:5, page:3, links:["급성신부전","만성신부전","체액조절"] },
        { name:"급성신부전", weight:4, page:4, links:["신부전"] },
        { name:"만성신부전", weight:4, page:6, links:["신부전","체액조절"] },
        { name:"체액조절", weight:2, page:5, links:["신부전","만성신부전"] },
      ],
    },
  };

  function authHeaders(extra){
    const t = localStorage.getItem('ln_token');
    const h = Object.assign({}, extra||{});
    if(t) h['Authorization'] = 'Bearer ' + t;
    return h;
  }
  async function getJSON(path){
    const r = await fetch(API + path, { method:'GET', headers: authHeaders() });
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }
  function setStatus(ok){
    const b = document.getElementById('banner');
    if(ok){ b.style.display='none'; }
    else { b.style.display='block';
      b.textContent='⚠ API 서버(127.0.0.1:8000)에 연결되지 않아 데모 데이터를 보여줍니다. run_api.sh 로 서버를 켜면 실제 데이터로 바뀝니다.'; }
  }
  const uid = () => document.getElementById('uid').value.trim() || '정유진';
  let latestLibrary = null;
  let latestTimetable = null;

  function updateBackButton(){
    const backBtn = document.getElementById('backBtn');
    if(state.page && state.page !== 'home'){
      backBtn.style.display = 'inline-flex';
    } else {
      backBtn.style.display = 'none';
    }
  }

  function setAppState(page, extra = {}, replace = false){
    state = { page, ...extra };
    const nextState = { page, ...extra };
    if(replace) history.replaceState(nextState, '', '');
    else history.pushState(nextState, '', '');
    updateBackButton();
    renderConfirmPanel();
  }

  function restoreAppState(event){
    const data = event.state;
    if(!data || data.page === 'home'){
      loadHome(false);
      return;
    }
    if(data.page === 'course'){
      state = { page: 'course', semester: data.semester, course: data.course, unit: null };
      openCourse(data.course, false);
      return;
    }
    if(data.page === 'unit'){
      state = { page: 'unit', semester: data.semester, course: data.course, unit: data.unit };
      openUnit(data.unit, false);
      return;
    }
    loadHome(false);
  }

  async function loadSidebar(){
    try {
      const d = await getJSON('/timetable/entries');
      latestTimetable = Array.isArray(d.entries) ? d.entries : [];
      setStatus(true);
    } catch (err) {
      latestTimetable = [];
      setStatus(false);
    }
    renderTimetableSidebar(latestTimetable);
    renderConfirmPanel();
  }

  const TT_WEEKDAYS = ['월','화','수','목','금'];
  function _ttMin(t){ const m=/(\d{1,2}):(\d{2})/.exec(t||''); return m ? (+m[1]*60 + +m[2]) : null; }
  function _ttRange(e){ const p=(e.time||'').split('-'); return [_ttMin(p[0]), _ttMin(p[1])]; }
  function _pad2(n){ return String(n).padStart(2,'0'); }

  function renderTimetableSidebar(entries){
    const container = document.getElementById('timetableContent');
    const list = Array.isArray(entries) ? entries : [];
    if(!list.length){
      container.innerHTML = '<div class="empty">시간표가 없습니다. 아래 ＋ 수업 추가로 등록하세요.</div>';
      return;
    }
    const withIdx = list.map((e, i) => Object.assign({}, e, { _i: i }));
    const semesters = [...new Set(withIdx.map(e => e.semester || '학기 미정'))].sort();
    // My Library에서 고른 학기를 기본값으로(없으면 첫 학기)
    let current = (state.semester && semesters.includes(state.semester)) ? state.semester : semesters[0];

    const opts = semesters.map(s => `<option value="${esc(s)}" ${s===current?'selected':''}>${esc(s)}</option>`).join('');
    container.innerHTML =
      `<div class="tt-sem-row">학기 <select id="ttSemSel">${opts}</select></div><div id="ttGridArea"></div>`;

    const drawGrid = (sem) => {
      const area = document.getElementById('ttGridArea');
      const items = withIdx.filter(e => (e.semester || '학기 미정') === sem);
      const weekItems = items.filter(e => TT_WEEKDAYS.includes(e.day) && _ttRange(e)[0]!=null);

      // 시간축: 데이터 범위로 1시간 단위 행 구성(없으면 9~19시)
      let minH = 9, maxH = 19;
      if(weekItems.length){
        const starts = weekItems.map(e => _ttRange(e)[0]);
        const ends = weekItems.map(e => { const [s,en]=_ttRange(e); return en ?? s+50; });
        minH = Math.floor(Math.min(...starts)/60);
        maxH = Math.ceil(Math.max(...ends)/60);
      }

      const N = maxH - minH;
      // 요일별로 수업이 차지하는 행을 계산해 rowspan으로 하나의 블록으로 합친다.
      const planByDay = {};
      TT_WEEKDAYS.forEach(d => {
        const plan = new Array(N).fill(null); // null=빈칸, {entries,span}=시작칸, 'skip'=병합으로 가려진 칸
        weekItems.filter(e => e.day===d)
          .sort((a,b)=>_ttRange(a)[0]-_ttRange(b)[0])
          .forEach(e => {
            const [s,en] = _ttRange(e); const end = en ?? s+50;
            let a = Math.max(0, Math.floor(s/60)-minH);
            let b = Math.min(N, Math.ceil(end/60)-minH); if(b<=a) b=a+1;
            if(plan[a] && plan[a].entries){ plan[a].entries.push(e); plan[a].span=Math.max(plan[a].span, b-a); }
            else if(plan[a]==='skip'){ let k=a; while(k>0 && plan[k]==='skip') k--; if(plan[k]&&plan[k].entries) plan[k].entries.push(e); }
            else { plan[a] = {entries:[e], span:b-a}; for(let i=a+1;i<b && i<N;i++){ if(plan[i]==null) plan[i]='skip'; } }
          });
        planByDay[d] = plan;
      });

      let html = '<table class="tt-grid"><thead><tr><th>시간</th>' +
        TT_WEEKDAYS.map(d => `<th>${d}</th>`).join('') + '</tr></thead><tbody>';
      for(let r=0; r<N; r++){
        const h = minH + r;
        html += `<tr><td class="tt-time">${_pad2(h)}:00-${_pad2(h+1)}:00</td>`;
        TT_WEEKDAYS.forEach(d => {
          const p = planByDay[d][r];
          if(p==='skip') return;            // 병합으로 가려진 칸은 td 생략
          if(p && p.entries){
            html += `<td rowspan="${p.span}">` + p.entries.map(e =>
              `<div class="tt-cell" title="${esc((e.time||'')+' '+(e.memo||''))}"><span>${esc(e.course)}</span><i class="edit" onclick="editTimetable(${e._i})">✎</i><i onclick="deleteTimetable(${e._i})">×</i></div>`
            ).join('') + '</td>';
          } else {
            html += '<td></td>';
          }
        });
        html += '</tr>';
      }
      html += '</tbody></table>';

      const others = items.filter(e => !TT_WEEKDAYS.includes(e.day) || _ttRange(e)[0]==null);
      if(others.length){
        html += '<div class="tt-other">' + others.map(e =>
          `<div class="tt-cell"><span>${esc(((e.day||'')+' '+(e.time||'')+' '+e.course).trim())}</span><i onclick="deleteTimetable(${e._i})">×</i></div>`
        ).join('') + '</div>';
      }
      area.innerHTML = html;
    };

    document.getElementById('ttSemSel').addEventListener('change', (ev)=>drawGrid(ev.target.value));
    drawGrid(current);
  }

  // 학습된 자료(/library)에 시간표 과목(/timetable)을 합쳐, 자료가 아직 없는 과목도 빈 액자로 보이게 한다.
  function mergeLibraryTimetable(lib, tt){
    const out = { total_chunks: (lib && lib.total_chunks) || 0, semesters: [] };
    const semMap = new Map();
    (lib && lib.semesters || []).forEach(s => {
      const courses = (s.courses || []).map(c => ({ course: c.course, files: c.files || [] }));
      semMap.set(s.semester, courses);
    });
    (tt && tt.semesters || []).forEach(s => {
      if(!semMap.has(s.semester)) semMap.set(s.semester, []);
      const courses = semMap.get(s.semester);
      const norm = (x)=> String(x||'').replace(/\s+/g,'').toLowerCase();
      (s.courses || []).forEach(name => {
        if(!courses.some(c => norm(c.course) === norm(name))) courses.push({ course: name, files: [] });
      });
    });
    [...semMap.entries()].sort((a,b)=> a[0]<b[0]?-1:1).forEach(([semester, courses]) => {
      courses.sort((a,b)=> a.course<b.course?-1:1);
      out.semesters.push({ semester, courses });
    });
    return out;
  }

  async function addTimetableEntry(){
    const sem = document.getElementById('tt_sem').value.trim();
    const time = document.getElementById('tt_time').value.trim();
    const course = document.getElementById('tt_course').value.trim();
    const memo = document.getElementById('tt_memo').value.trim();
    const days = [...document.querySelectorAll('#tt_days input:checked')].map(c=>c.value);
    const status = document.getElementById('tt_status');
    if(!sem || !course){ status.style.color='#ef4444'; status.textContent='학기와 과목명은 필수입니다.'; return; }
    const editing = ttEditIndex != null;
    try {
      if(editing){
        const body = { semester:sem, day: days[0]||'', time, course, memo };
        const r = await fetch(API+'/timetable/entries?index='+ttEditIndex, {method:'PUT', headers: authHeaders({'Content-Type':'application/json'}), body:JSON.stringify(body)});
        if(!r.ok) throw new Error('HTTP '+r.status);
        status.style.color='#16a34a'; status.textContent='수정됨 ✓';
      } else {
        const list = days.length ? days : [''];
        for(const day of list){
          const body = { semester:sem, day, time, course, memo };
          const r = await fetch(API+'/timetable/entries', {method:'POST', headers: authHeaders({'Content-Type':'application/json'}), body:JSON.stringify(body)});
          if(!r.ok) throw new Error('HTTP '+r.status);
        }
        status.style.color='#16a34a'; status.textContent = `추가됨 ✓ (${list.filter(Boolean).length||1}일)`;
      }
      _ttResetForm();
      await loadSidebar();

  }

  // 액자 색(과목명 기반 결정적 그라데이션)
  function hashString(name){
    let h = 0;
    for(const ch of String(name)){
      h = (h * 131 + ch.charCodeAt(0)) % 1000000007;
    }
    return h;
  }

  const PASTELS = [
    ["#fff3b0","#ffd166"], ["#ffe8cc","#ffc078"], ["#ffd8a8","#ffb677"], ["#ffec99","#ffd43b"],
    ["#ffc9c9","#ff8787"], ["#ffd6e7","#f78fb3"], ["#ffe0e9","#faa2c1"], ["#eebefa","#da77f2"],
    ["#e5d4ff","#b197fc"], ["#d4ddff","#91a7ff"], ["#cdeffd","#74c0fc"], ["#c5f6fa","#66d9e8"],
    ["#c3fae8","#63e6be"], ["#d3f9d8","#8ce99a"], ["#e9fac8","#c0eb75"], ["#f1e4c3","#dcc48e"],
  ];
  function artColor(name){
    const pair = PASTELS[hashString(name) % PASTELS.length];
    return `linear-gradient(135deg, ${pair[0]}, ${pair[1]})`;
  }

  function artDoodle(name){
    const hash = hashString(name);
    const palettes = [
      ["#fde68a", "#fbbf24", "#f97316"],
      ["#a5f3fc", "#38bdf8", "#0ea5e9"],
      ["#bfdbfe", "#60a5fa", "#2563eb"],
      ["#d9f99d", "#86efac", "#22c55e"],
      ["#fbcfe8", "#f9a8d4", "#db2777"],
      ["#fee2e2", "#fca5a5", "#ef4444"],
      ["#ddd6fe", "#a78bfa", "#7c3aed"],
      ["#c7f9e9", "#5eead4", "#14b8a6"],
      ["#fed7aa", "#fb923c", "#ea580c"],
      ["#e9d5ff", "#d8b4fe", "#9333ea"],
      ["#bbf7d0", "#4ade80", "#16a34a"],
      ["#fecdd3", "#fb7185", "#e11d48"],
    ];
    const c = palettes[hash % palettes.length];
    const ink = "#43403d";            // 크레용 같은 진한 외곽선
    const lower = String(name).toLowerCase();
    let motif = "";

    if(lower.includes('화학')){
      motif = `<g fill="${c[1]}" stroke="${ink}" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M86 48 L86 70 L66 112 Q62 126 80 126 L120 126 Q138 126 134 112 L114 70 L114 48 Z"/>
        <line x1="80" y1="48" x2="120" y2="48"/></g>
        <circle cx="92" cy="106" r="5" fill="${c[2]}"/><circle cx="108" cy="114" r="4" fill="${c[0]}"/>`;
    } else if(lower.includes('통계')){
      motif = `<g stroke="${ink}" stroke-width="5" stroke-linejoin="round">
        <rect x="62" y="86" width="20" height="38" fill="${c[0]}"/>
        <rect x="90" y="62" width="20" height="62" fill="${c[1]}"/>
        <rect x="118" y="98" width="20" height="26" fill="${c[2]}"/>
        <line x1="52" y1="126" x2="150" y2="126" stroke-linecap="round"/></g>`;
    } else if(lower.includes('인체') || lower.includes('구조') || lower.includes('기능')){
      motif = `<g stroke="${ink}" stroke-width="6" stroke-linecap="round" fill="none">
        <circle cx="100" cy="50" r="16" fill="${c[0]}"/>
        <line x1="100" y1="66" x2="100" y2="106"/>
        <path d="M100 78 L78 94 M100 78 L122 94"/>
        <path d="M100 106 L84 128 M100 106 L116 128"/></g>`;
    } else if(lower.includes('생물')){
      motif = `<g stroke="${ink}" stroke-width="5" stroke-linejoin="round">
        <g fill="${c[0]}"><circle cx="100" cy="44" r="12"/><circle cx="122" cy="56" r="12"/><circle cx="122" cy="80" r="12"/><circle cx="100" cy="92" r="12"/><circle cx="78" cy="80" r="12"/><circle cx="78" cy="56" r="12"/></g>
        <circle cx="100" cy="68" r="12" fill="${c[2]}"/></g>
        <path d="M100 92 L100 132" stroke="${ink}" stroke-width="5" fill="none" stroke-linecap="round"/>`;
    } else if(lower.includes('병태') || lower.includes('생리')){
      motif = `<path d="M100 126 C42 86 66 46 100 72 C134 46 158 86 100 126 Z" fill="${c[0]}" stroke="${ink}" stroke-width="6" stroke-linejoin="round"/>
        <path d="M72 92 H90 L98 78 L108 106 L116 92 H132" fill="none" stroke="${ink}" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>`;
    } else if(lower.includes('간호')){
      motif = `<path d="M100 126 C42 86 66 46 100 72 C134 46 158 86 100 126 Z" fill="${c[0]}" stroke="${ink}" stroke-width="6" stroke-linejoin="round"/>
        <g fill="#ffffff"><rect x="92" y="80" width="16" height="38" rx="3"/><rect x="81" y="91" width="38" height="16" rx="3"/></g>`;
    } else {
      motif = `<g stroke="${ink}" stroke-width="6" stroke-linejoin="round">
        <rect x="74" y="86" width="52" height="42" fill="${c[0]}"/>
        <path d="M68 86 L100 58 L132 86 Z" fill="${c[1]}"/>
        <rect x="92" y="106" width="16" height="22" fill="${c[2]}"/></g>`;
    }

    const sun = `<g stroke="${ink}" stroke-width="4" stroke-linecap="round" fill="none">
        <circle cx="30" cy="28" r="10" fill="${c[0]}"/>
        <path d="M30 10 V3 M30 53 V46 M12 28 H5 M55 28 H48 M17 15 L12 10 M43 15 L48 10 M17 41 L12 46 M43 41 L48 46"/></g>`;
    const ground = `<path d="M12 140 q18 -9 36 0 t36 0 t36 0 t36 0" fill="none" stroke="${ink}" stroke-width="4" stroke-linecap="round" opacity="0.6"/>`;

    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
      
      <g>${sun}${motif}${ground}</g></svg>`;

    const base64 = btoa(unescape(encodeURIComponent(svg)));
    return `url('data:image/svg+xml;base64,${base64}')`;
  }

  let lastUnitsData = null;
  function _uSortKey(){ return 'unitsort_'+state.semester+'_'+state.course; }
  function _uOrderKey(){ return 'unitorder_'+state.semester+'_'+state.course; }
  function sortUnits(units){
    const mode = localStorage.getItem(_uSortKey()) || 'ga';
    const arr = [...units];
    if(mode==='ga') arr.sort((a,b)=> (a.unit||'').localeCompare(b.unit||'','ko'));
    else if(mode==='reg') arr.sort((a,b)=> (a.registered_at||'').localeCompare(b.registered_at||'') || (a.unit||'').localeCompare(b.unit||'','ko'));
    else if(mode==='custom'){
      let ord=[]; try{ ord=JSON.parse(localStorage.getItem(_uOrderKey())||'[]'); }catch(e){}
      const idx=u=>{ const k=ord.indexOf(u.unit); return k<0?9999:k; };
      arr.sort((a,b)=> idx(a)-idx(b));
    } // 'reg' = 등록순(registered_at), 'custom' = 드래그 저장
    return arr;
  }
  function changeUnitSort(){ localStorage.setItem(_uSortKey(), document.getElementById('unitSortSel').value); if(lastUnitsData) renderUnits(state.course, lastUnitsData); }
  let _dragU=null;
  function unitDragStart(e){ _dragU=e.currentTarget; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
  function unitDragEnd(e){ e.currentTarget.classList.remove('dragging'); }
  function unitDragOver(e){ e.preventDefault(); const t=e.currentTarget; if(!_dragU||t===_dragU)return;
    const r=t.getBoundingClientRect(); const after=e.clientY > r.top+r.height/2;
    t.parentNode.insertBefore(_dragU, after? t.nextSibling : t); }
  function unitDrop(e){ e.preventDefault();
    const grid=document.getElementById('unitGrid'); if(!grid) return;
    const order=[...grid.querySelectorAll('.card')].map(c=>c.dataset.unit);
    localStorage.setItem(_uOrderKey(), JSON.stringify(order));
    localStorage.setItem(_uSortKey(),'custom');
    const sel=document.getElementById('unitSortSel'); if(sel) sel.value='custom'; }
  function renderUnits(course, data){
    setCrumbs([['홈', 'loadHome()'], [state.semester, 'openSemesterMenu(event)', 'menu'], [course, 'openCourseMenu(event)', 'menu']]);
    lastUnitsData = data;
    const view = document.getElementById('view');
    const units = data.units || [];
    if(!units.length || data.status==='empty'){
      view.innerHTML = `<div class="units-head"><div class="section-title">${esc(course)} · 단원</div><button class="addmini" onclick="openAddForCourse()">＋ 자료 추가</button></div>` +
        emptyBox('아직 이 과목에 단원이 없습니다. ＋ 자료 추가로 PDF를 올리고 단원명을 적으면 여기에 나타납니다.');
      return;
    }
    const mode = localStorage.getItem(_uSortKey()) || 'ga';
    const opt=(v,t)=>`<option value="${v}"${mode===v?' selected':''}>${t}</option>`;
    const sorted = sortUnits(units);
    view.innerHTML = `<div class="units-head"><div class="section-title">${esc(course)} · 단원</div>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="unitSortSel" class="mini-sel" onchange="changeUnitSort()">${opt('ga','ㄱㄴㄷ')}${opt('reg','등록순')}${opt('custom','내 순서(드래그)')}</select>
        <button class="addmini" onclick="openAddForCourse()">＋ 자료 추가</button>
      </div></div>
      <div class="grid" id="unitGrid">${sorted.map((u,i)=>`
        <div class="card" draggable="true" data-unit="${esc(u.unit)}" onclick='openUnit(${JSON.stringify(u.unit)})'
             ondragstart="unitDragStart(event)" ondragend="unitDragEnd(event)" ondragover="unitDragOver(event)" ondrop="unitDrop(event)">
          <div><div class="ctag">⠿ 단원</div><div class="ctitle">${esc(u.unit)}</div></div>
          <div class="cmeta">파일 ${u.file_count||0} · 페이지 ${u.page_count||0}</div>
        </div>`).join('')}</div>`;
  }

  async function openUnit(unit, push=true){

    state.unit = unit;
    if(push) setAppState('unit', { semester: state.semester, course: state.course, unit });
    let nodes = [], demo = false, notReady = false;

      const d = await getJSON(`/concepts?semester=${encodeURIComponent(state.semester)}&course=${encodeURIComponent(state.course)}&unit=${encodeURIComponent(unit)}`);
      setStatus(true);

      else { notReady = true; nodes = DEMO.concepts[unit] || DEMO.concepts["급성 신부전, 만성 신부전"]; demo = true; }
    } catch(e){ setStatus(false); nodes = DEMO.concepts[unit] || DEMO.concepts["급성 신부전, 만성 신부전"]; demo = true; }

  async function clinicalVerify(){
    const claim = (document.getElementById('clin_claim')?.value || '').trim();
    const st = document.getElementById('clin_status');
    const out = document.getElementById('clin_result');
    const btn = document.getElementById('clinVerifyBtn');
    if(!claim){ st.textContent = '검증할 문장을 입력하세요.'; return; }
    btn.disabled = true; st.textContent = '자료 검색·검증 중…'; out.innerHTML = '';
    try{
      const r = await fetch(API + '/clinical/verify', {
        method:'POST', headers: authHeaders({'Content-Type':'application/json'}),
        body: JSON.stringify({ claim, semester: state.semester, course: state.course, unit: state.unit }),
      });
      const d = await r.json();
      if(!r.ok){ st.textContent = d.detail || '검증 실패'; btn.disabled = false; return; }
      st.textContent = '';
      lastClinicalResult = d;
      const srcs = (d.sources || []).map(s =>
        `<div class="clin-src"><b>${esc(s.doc_title)}</b> · p.${esc(s.page_num)}` +
        (s.similarity != null ? ` · 유사도 ${esc(s.similarity)}%` : '') + `</div>`).join('');
      out.innerHTML = `<div class="clin-card">
        <span class="k">근거강도</span>${clinStrengthBadge(d.draft.strength)}
        <span class="k">출처 요약</span>${esc(d.draft.source_summary || '—')}
        <span class="k">임상 적용 맥락 (교육 목적)</span>${esc(d.draft.application_context || '—')}
        <span class="k">안전 메모</span>${esc(d.draft.safety_note || '—')}
        <span class="k">검색 범위</span>${esc(d.scope_label || '')}
        ${srcs ? `<span class="k">근거 출처</span>${srcs}` : ''}
        ${renderRelatedConcepts(d.related_concepts, '함께 볼 연계 개념 (다른 과목)')}
        <div class="clin-row" style="margin-top:10px"><button class="clin-btn" onclick="clinicalSave()">검증 기록 저장</button></div>
      </div>`;
    }catch(e){ st.textContent = '서버에 연결할 수 없습니다.'; }
    btn.disabled = false;
  }

        method:'POST', headers: authHeaders({'Content-Type':'application/json'}),
        body: JSON.stringify({ claim: d.claim, ...d.draft, course: state.course || '', unit: state.unit || '' }),

  function recallPanelHTML(){

  let selectedRecallConcept = "";
  function recallQuery(concept){

      course: state.course || "",

    if(concept) params.set("concept", concept);

  async function showRecallPanel(concept){
    selectedRecallConcept = concept || "";

    if(!panel || !selectedRecallConcept) return;
    panel.hidden = false;
    recallHistoryExpanded = false;
    document.getElementById("recallConcept").textContent = selectedRecallConcept;

  async function loadRecallTraces(concept){
    const status = document.getElementById("recallStatus");
    const list = document.getElementById("recallList");
    if(!list) return;
    status.textContent = "기록을 불러오는 중...";
    try {
      const data = await getJSON(`/recall-traces?${recallQuery(concept)}&limit=100`);
      latestRecallTraces = Array.isArray(data.traces) ? data.traces : [];
      renderRecallTraces();
      status.textContent = "";
    } catch(e){
      latestRecallTraces = [];
      status.textContent = "Learning Memory를 불러오지 못했습니다.";
      list.innerHTML = "";
    }

  let latestRecallTraces = [];
  let recallHistoryExpanded = false;

  function toggleRecallHistory(){
    recallHistoryExpanded = !recallHistoryExpanded;
    renderRecallTraces();
  }

  function recallConceptKey(value){
    return String(value || '').replace(/\s+/g, '').toLowerCase();
  }

  function applyRecallTraceToGraph(trace){
    if(!trace || !lastNodes) return;
    const key = recallConceptKey(trace.concept);
    let changed = false;
    lastNodes.forEach(n => {
      if(recallConceptKey(n.name) !== key && recallConceptKey(n.keyword) !== key) return;
      n.recall_count = Number(n.recall_count || 0) + 1;
      n.last_recalled_at = trace.created_at || n.last_recalled_at || null;
      changed = true;
    });
    if(changed) layoutNodes(lastNodes);
  }

  function renderRecallTraces(){
    const list = document.getElementById("recallList");
    const toggle = document.getElementById("recallHistoryToggle");
    if(!list) return;
    const traces = latestRecallTraces || [];
    if(toggle){
      toggle.textContent = recallHistoryExpanded ? `전체 Learning Memory ${traces.length}개` : "최근 Learning Memory";
      toggle.disabled = !traces.length;
      toggle.title = traces.length ? "누적 Learning Memory 보기" : "저장된 Learning Memory 없음";
    }
    if(!traces.length){
      list.innerHTML = `<div class="recall-item">아직 저장된 설명이 없습니다.</div>`;
      return;
    }
    const visibleTraces = recallHistoryExpanded ? traces : traces.slice(0, 5);
    const rows = visibleTraces.map((t, i) => {
      const originalIndex = traces.indexOf(t);
      const feedback = t.feedback && typeof t.feedback === "object" ? t.feedback : null;
      const feedbackStamp = t.feedback_created_at ? `<small>AI 피드백 · ${esc(formatRecallDate(t.feedback_created_at))}</small>` : "";
      const feedbackBox = feedback
        ? `<div id="feedbackBox${originalIndex}" class="feedback-box">${feedbackStamp}${renderFeedback(feedback)}</div>`
        : `<div id="feedbackBox${originalIndex}" class="feedback-box" hidden></div>`;
      return `<div class="recall-item"><small>${esc(formatRecallDate(t.created_at))}</small>${esc(t.answer_text)}<div class="recall-item-actions"><button onclick="requestRecallFeedback(${originalIndex})">${feedback ? "AI 피드백 다시 생성" : "AI 피드백"}</button><span id="feedbackStatus${originalIndex}" class="recall-status"></span></div>${feedbackBox}</div>`;
    }).join("");
    const more = !recallHistoryExpanded && traces.length > 5
      ? `<button class="recall-history-toggle" onclick="toggleRecallHistory()">Learning Memory ${traces.length}개 보기</button>`
      : "";
    list.innerHTML = rows + more;
  }

  function renderFeedback(data){
    const list = (items) => Array.isArray(items) && items.length
      ? `<ul>${items.map(item => `<li>${esc(item)}</li>`).join("")}</ul>`
      : `<div class="muted">자료에서 뚜렷하게 확인되지 않았습니다.</div>`;
    const related = renderRelatedConcepts(data.related_concepts, '이어서 볼 연계 개념 — 다른 과목 (누르면 연결 지도)');
    return `<strong>좋았던 점</strong>${list(data.good_points)}
      <strong>더 연결해볼 점</strong>${list(data.missing_links)}
      <strong>다시 생각해볼 질문</strong><div>${esc(data.followup_question || "")}</div>
      <strong>다시 볼 자료</strong><div>${esc(data.source_hint || "")}</div>${related}`;
  }

  async function requestRecallFeedback(index){
    const trace = latestRecallTraces[index];
    const status = document.getElementById(`feedbackStatus${index}`);
    const box = document.getElementById(`feedbackBox${index}`);
    if(!trace || !status || !box) return;
    status.textContent = "생성 중...";
    box.hidden = true;
    try {
      const r = await fetch(API + "/recall-feedback", {
        method:"POST",
        headers: authHeaders({"Content-Type":"application/json"}),
        body:JSON.stringify({
          semester: trace.semester,
          course: trace.course,
          unit: trace.unit,
          concept: trace.concept,
          answer_text: trace.answer_text,
          trace_id: trace.id || "",
        }),
      });
      const d = await r.json().catch(()=>({}));
      if(!r.ok){ status.textContent = d.detail || "피드백 실패"; return; }
      trace.feedback = d;
      trace.feedback_created_at = new Date().toISOString();
      box.innerHTML = `<small>AI 피드백 · ${esc(formatRecallDate(trace.feedback_created_at))}</small>` + renderFeedback(d);
      box.hidden = false;
      status.textContent = "";
    } catch(e){
      status.textContent = "서버에 연결할 수 없습니다.";
    }
  }

  async function saveRecallTrace(){
    const status = document.getElementById("recallStatus");
    const answer = document.getElementById("recallAnswer").value.trim();
    if(!selectedRecallConcept){ status.textContent = "먼저 개념을 선택하세요."; return; }

  function formatRecallDate(value){
    const d = new Date(value);
    if(Number.isNaN(d.getTime())) return value || "";
    return d.toLocaleString("ko-KR", { dateStyle:"short", timeStyle:"short" });

  let lastNodes = null;
  let lastCore = null;
  let drillVisible = null;
  function graphReviewPriority(node){
    if(Number.isFinite(Number(node?.review_priority))) return Number(node.review_priority);
    if(String(node?.learning_state || '').toUpperCase() === 'NEW') return 70;
    return Number(node?.review_score || node?.weak_score || 0);
  }
  function initDrill(nodes){
    const sorted=[...nodes].sort((a,b)=>graphReviewPriority(b)-graphReviewPriority(a) || ((b.weight||0)-(a.weight||0)));
    drillVisible = new Set(sorted.slice(0, Math.min(12, sorted.length)).map(n=>n.name));
  }
  function drillReset(){ drillVisible=null; if(lastNodes) layoutNodes(lastNodes); }
  function drillAll(){ if(lastNodes){ drillVisible=new Set(lastNodes.map(n=>n.name)); layoutNodes(lastNodes); } }
  function conceptPrimaryOccurrence(n){
    const occurrences = Array.isArray(n.occurrences) ? n.occurrences.filter(x=>x && (x.page || x.filename)) : [];
    occurrences.sort((a,b)=>(Number(a.page||0)-Number(b.page||0)) || String(a.filename||"").localeCompare(String(b.filename||"")));
    const first = occurrences[0] || {};
    return { filename:first.filename || n.filename, page:first.page || n.page || 1 };
  }
  function conceptPageSummary(n){
    const occurrences = Array.isArray(n.occurrences) ? n.occurrences.filter(x=>x && x.page) : [];
    const pages = occurrences.length ? [...new Set(occurrences.map(x=>Number(x.page)).filter(Boolean))].sort((a,b)=>a-b) : (n.page ? [Number(n.page)] : []);
    if(!pages.length) return "페이지 정보 없음";
    return "나오는 페이지 " + pages.map(p=>`p.${p}`).join(", ");
  }
  function expandNode(n, nodes){
    const rel=(n.links||[]).filter(t=>nodes.some(x=>x.name===t));
    let changed=false;
    rel.forEach(t=>{ if(!drillVisible.has(t)){ drillVisible.add(t); changed=true; } });
    if(changed){ drillVisible.add(n.name); layoutNodes(nodes); }
    selectNode(n.name, nodes.filter(x=>drillVisible.has(x.name)));
    const target = conceptPrimaryOccurrence(n);
    if(target.filename) docShow(target.filename, target.page || 1);
  }
  function layoutNodes(nodes){
    lastNodes = nodes;
    const canvas = document.getElementById('canvas'); if(!canvas) return;
    const svg = document.getElementById('lines');
    canvas.querySelectorAll('.node').forEach(n=>n.remove());
    canvas.querySelectorAll('.group-hub').forEach(n=>n.remove());
    svg.innerHTML='';
    if(!drillVisible) initDrill(nodes);
    const vis = nodes.filter(n=>drillVisible.has(n.name));
    if(!vis.length) return;
    const W = canvas.clientWidth, H = canvas.clientHeight;
    const core = vis.reduce((a,b)=> (b.weight||0)>(a.weight||0)?b:a, vis[0]);
    const others = vis.filter(n=>n!==core);
    const pos = {}; pos[core.name] = { x: W/2, y: H/2 };
    others.forEach((n,i)=>{
      const ang = (Math.PI*2*i)/Math.max(others.length,1) - Math.PI/2;
      pos[n.name] = { x: W/2 + Math.cos(ang)*Math.min(W,920)*0.38, y: H/2 + Math.sin(ang)*H*0.40 };
    });
    lastCore = core.name;
    const names = new Set(vis.map(n=>n.name));
    const drawn = new Set();
    vis.forEach(n => (n.links||[]).forEach(t => {
      if(!names.has(t) || t===n.name || !pos[t]) return;
      const key=[n.name,t].sort().join('|'); if(drawn.has(key))return; drawn.add(key);
      const a=pos[n.name], b=pos[t];
      const l=document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1',a.x);l.setAttribute('y1',a.y);l.setAttribute('x2',b.x);l.setAttribute('y2',b.y);
      l.setAttribute('class','line'); l.dataset.a=n.name; l.dataset.b=t; svg.appendChild(l);
    }));
    function updateLinesFor(name){
      svg.querySelectorAll('.line').forEach(l => {
        if(l.dataset.a===name){ l.setAttribute('x1',pos[name].x); l.setAttribute('y1',pos[name].y); }
        if(l.dataset.b===name){ l.setAttribute('x2',pos[name].x); l.setAttribute('y2',pos[name].y); }
      });
    }
    vis.forEach((n,i) => {
      const w = n.weight||3;
      const hasMore = (n.links||[]).some(t=>nodes.some(x=>x.name===t) && !drillVisible.has(t));
      const el = document.createElement('div');
      const recallCount = Number(n.recall_count || 0);
      const recallClass = recallCount <= 0 ? ' recall-none' : ` recall-${Math.min(4, recallCount)}`;
      const stateLabel = recallCount <= 0 ? '미설명' : `설명 ${recallCount}회`;
      const stateBadge = `<div class="state-badge">${esc(stateLabel)}</div>`;
      const target = conceptPrimaryOccurrence(n);
      el.className = `node w${w}` + (n===core?' core':'') + (hasMore?' has-more':'') + recallClass;
      el.style.left = pos[n.name].x+'px'; el.style.top = pos[n.name].y+'px';
      el.style.animationDelay = (i*0.05)+'s';
      el.innerHTML = `<div class="nm">${esc(n.name)}</div>` + (target.page?`<div class="pg">p.${esc(String(target.page))}</div>`:'') + stateBadge + (hasMore?`<div class="more">＋</div>`:'');
      el.addEventListener('mouseenter', (e)=>{ if(!dragging) showTip(n, e); });
      el.addEventListener('mousemove', (e)=>{ if(!dragging) moveTip(e); });
      el.addEventListener('mouseleave', hideTip);
      el.addEventListener('pointerdown', (e)=>{
        e.preventDefault(); hideTip();
        const rect = canvas.getBoundingClientRect();
        let moved = 0; dragging = true; el.classList.add('dragging'); el.setPointerCapture(e.pointerId);
        const startX = e.clientX, startY = e.clientY;
        const move = (ev)=>{
          moved += Math.abs(ev.clientX - startX) + Math.abs(ev.clientY - startY);
          pos[n.name].x = Math.max(20, Math.min(rect.width-20, ev.clientX - rect.left));
          pos[n.name].y = Math.max(20, Math.min(rect.height-20, ev.clientY - rect.top));
          el.style.left = pos[n.name].x+'px'; el.style.top = pos[n.name].y+'px';
          updateLinesFor(n.name);
        };
        const up = (ev)=>{
          el.classList.remove('dragging'); dragging = false;
          el.removeEventListener('pointermove', move); el.removeEventListener('pointerup', up);
          if(moved < 6){ expandNode(n, nodes); }
        };
        el.addEventListener('pointermove', move); el.addEventListener('pointerup', up);
      });
      canvas.appendChild(el);
    });
    canvas.onclick = (e)=>{ if(e.target.id!=='canvas' && e.target.tagName!=='svg') return;
      canvas.querySelectorAll('.node').forEach(x=>x.classList.remove('dim','active'));
      svg.querySelectorAll('.line').forEach(x=>x.classList.remove('active')); };
  }

  let dragging = false;
  function showTip(n, e){
    const tip = document.getElementById('tip');
    const links = (n.links||[]).length;
    const recallCount = Number(n.recall_count || 0);
    const stateText = recallCount <= 0 ? '아직 설명 없음' : `설명 ${recallCount}회`;
    const pageText = conceptPageSummary(n);
    tip.innerHTML = `<div class="t-nm">${esc(n.name)}</div>` +
      `<div class="t-meta">${esc(pageText)} · 연결 개념 ${links}개 · ${stateText}</div>`;
    tip.classList.add('on'); moveTip(e);
  }
  function moveTip(e){
    const tip = document.getElementById('tip');
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top  = (e.clientY + 14) + 'px';
  }
  function hideTip(){ document.getElementById('tip').classList.remove('on'); }
  function selectNode(name, nodes){
    const node = nodes.find(n=>n.name===name);
    let nLinks = (node.links||[]).filter(t => nodes.some(x=>x.name===t) && t!==name);
    if(!nLinks.length && lastCore && name!==lastCore) nLinks = [lastCore];
    const keep = new Set([name, ...nLinks]);
    document.querySelectorAll('#canvas .node').forEach(el => {
      const nm = el.querySelector('.nm').textContent;
      el.classList.toggle('dim', !keep.has(nm));
      el.classList.toggle('active', nm===name);
    });
    document.querySelectorAll('#lines .line').forEach(l => {
      l.classList.toggle('active', l.dataset.a===name || l.dataset.b===name);
    });
    showRecallPanel(name);
  }

    if(input.files.length && input===rows[rows.length-1]) addFileRow();
  }
  function removeFileRow(x){
    const c=document.getElementById('up_files'); const row=x.closest('.up-row');
    if(c.querySelectorAll('.up-row').length>1) row.remove();
    else row.querySelector('input').value='';
  }
  async function doUpload(){
    const v=(id)=>document.getElementById(id).value.trim();
    const files=[...document.querySelectorAll('#up_files input.up_f')].map(i=>i.files[0]).filter(Boolean);
    const st=document.getElementById('up_status');
    const miss=[]; if(!v('up_sem'))miss.push('학기'); if(!v('up_course'))miss.push('과목'); if(!v('up_title'))miss.push('자료명'); if(!files.length)miss.push('PDF');
    if(miss.length){ st.style.color='#ef4444'; st.textContent='비어있음: '+miss.join(', '); return; }
    let okN=0, failN=0;
    for(let i=0;i<files.length;i++){
      st.style.color='#2563eb'; st.textContent=`업로드·학습 중… (${i+1}/${files.length}) ${files[i].name}`;
      const fd=new FormData();
      fd.append('semester', v('up_sem')); fd.append('course', v('up_course'));
      fd.append('title', v('up_title')); fd.append('unit', v('up_unit')); fd.append('file', files[i]);
      try{
        const r=await fetch(API+'/ingest',{method:'POST', headers: authHeaders(), body:fd});
        const d=await r.json();
        if(!r.ok || d.ok===false){ failN++; } else { okN++; }
      }catch(e){ failN++; }
    }
    st.style.color = failN? '#ef4444' : '#16a34a';
    st.textContent = `완료: 성공 ${okN}개${failN?(', 실패 '+failN+'개'):''}`;
    resetFileRows();
    await loadHome(false);
  }
  // ===== 로그인 / 인증 =====
  async function authInit(){
    const token = localStorage.getItem('ln_token');
    if(token){
      try {
        const r = await fetch(API+'/auth/me', { headers:{ Authorization:'Bearer '+token } });
        if(r.ok){ const d = await r.json(); setSession(d.user); return; }
      } catch(e){}
      localStorage.removeItem('ln_token');
    }
    showAuth();
  }
  function showAuth(){ document.getElementById('authOverlay').hidden = false; initGoogle(); }
  function setSession(user){
    sessionUser = user;
    document.getElementById('uid').value = user.data_user_id || user.email;
    document.getElementById('userChip').textContent = user.display_name || user.email;
    document.getElementById('myPageLink').style.display = 'inline-block';
    document.getElementById('clinicalReflectionBtn').style.display = user.student_track === 'nursing' ? 'inline-block' : 'none';
    document.getElementById('logoutBtn').style.display = 'inline-block';
    document.getElementById('authOverlay').hidden = true;
    // 다른 페이지에서 로그인하러 온 경우(?next=/study.html 등) 원래 목적지로 돌려보낸다.
    const next = new URLSearchParams(location.search).get('next');
    if (next && next.startsWith('/') && !next.startsWith('//')) { location.replace(next); return; }
    ensureInitialHistory();
    loadHome(false);
  }
  function logout(){ localStorage.removeItem('ln_token'); location.reload(); }
  function authTab(which){
    document.getElementById('authTabLogin').classList.toggle('on', which==='login');
    document.getElementById('authTabReg').classList.toggle('on', which==='register');
    document.getElementById('au_reg_only').hidden = which!=='register';
    const btn = document.getElementById('au_submit');
    btn.textContent = which==='register' ? '회원가입' : '로그인';
    btn.dataset.mode = which;
  }
  async function authSubmit(){
    const mode = document.getElementById('au_submit').dataset.mode || 'login';
    const email = document.getElementById('au_email').value.trim();
    const pw = document.getElementById('au_pw').value;
    const st = document.getElementById('au_status');
    if(!email || !pw){ st.style.color='#ef4444'; st.textContent='이메일과 비밀번호를 입력하세요.'; return; }
    st.style.color='#2563eb'; st.textContent='처리 중…';
    try{
      let url, body;
      if(mode==='register'){
        url = API+'/auth/register';
        body = {
          email,
          password:pw,
          display_name:document.getElementById('au_name').value.trim(),
          student_track:document.getElementById('au_track').value || 'general',
        };
      } else {
        url = API+'/auth/login'; body = { email, password:pw };
      }
      const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      const d = await r.json();
      if(!r.ok){ st.style.color='#ef4444'; st.textContent=(d.detail||'실패'); return; }
      localStorage.setItem('ln_token', d.token);
      setSession(d.user);
    }catch(e){ st.style.color='#ef4444'; st.textContent='서버 미연결 — 다시 시도'; }
  }
  function googleLogin(){
    const st = document.getElementById('au_status');
    st.style.color='#9a3412'; st.textContent='Google 로그인이 아직 설정되지 않았습니다(.env의 GOOGLE_CLIENT_ID 확인).';
  }
  let _gisDone = false;
  async function initGoogle(){
    if(_gisDone) return;
    // 데스크톱 앱(Tauri 웹뷰)에서는 Google 로그인이 차단되므로 버튼을 숨긴다
    if(window.__TAURI__ || window.__TAURI_INTERNALS__){
      const g=document.getElementById('gbtn'); if(g) g.style.display='none';
      const b=document.getElementById('au_google'); if(b) b.style.display='none';
      const d=document.querySelector('.auth-divider'); if(d) d.style.display='none';
      return;
    }
    let cfg = {};
    try { cfg = await (await fetch(API+'/auth/config')).json(); } catch(e){}
    if(!cfg.google_client_id){ const b=document.getElementById('au_google'); if(b) b.hidden=false; return; }
    let tries=0;
    while(!(window.google && google.accounts && google.accounts.id) && tries<40){ await new Promise(r=>setTimeout(r,100)); tries++; }
    if(!(window.google && google.accounts && google.accounts.id)){ const b=document.getElementById('au_google'); if(b) b.hidden=false; return; }
    google.accounts.id.initialize({ client_id: cfg.google_client_id, callback: onGoogleCredential });
    const el=document.getElementById('gbtn');
    if(el){ el.innerHTML=''; google.accounts.id.renderButton(el, { theme:'outline', size:'large', width:320, text:'continue_with' }); }
    _gisDone = true;
  }
  async function onGoogleCredential(resp){
    const st=document.getElementById('au_status'); st.style.color='#2563eb'; st.textContent='Google 로그인 중…';
    try{
      const r=await fetch(API+'/auth/google',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({credential:resp.credential})});
      const d=await r.json();
      if(!r.ok){ st.style.color='#ef4444'; st.textContent=(d.detail||'실패'); return; }
      localStorage.setItem('ln_token', d.token); setSession(d.user);
    }catch(e){ st.style.color='#ef4444'; st.textContent='서버 미연결 — 다시 시도'; }
  }
  function setCrumbs(items){
    const el = document.getElementById('crumbs');
    if(!items.length){ el.innerHTML=''; return; }
    el.innerHTML = items.map((it,i)=>{
      let piece;
      if(it[1] && it[2]==='menu'){
        piece = `<a class="crumb plain has-menu" onclick='${it[1]}'>${esc(it[0])}</a>`;
      } else if(it[1]){
        piece = `<a class="crumb link" onclick='${it[1]}'>${esc(it[0])}</a>`;
      } else {
        piece = `<span class="crumb plain">${esc(it[0])}</span>`;
      }
      return piece + (i<items.length-1 ? '<span class="crumb-sep">›</span>' : '');
    }).join('');
  }
  function emptyBox(msg){ return `<div class="empty">${esc(msg)}</div>`; }
  function emptyInline(msg){ return `<div class="empty" style="grid-column:1/-1">${esc(msg)}</div>`; }
  function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  window.addEventListener('resize', ()=>{ if(lastNodes && document.getElementById('canvas')) layoutNodes(lastNodes); });

  authInit();
</script>
