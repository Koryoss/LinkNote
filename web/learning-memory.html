<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkNote · Learning Memory</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; background:#fbfcfe; color:#1f2937; }
  .topbar { position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:10px; padding:12px 24px; background:rgba(255,255,255,.94); backdrop-filter:blur(6px); border-bottom:1px solid #eef1f6; }
  .brand { font-size:1.18rem; font-weight:800; color:#1e293b; text-decoration:none; }
  .spacer { flex:1; }
  .btn, button { border:1px solid #d8dee9; background:#fff; color:#2563eb; border-radius:8px; padding:8px 12px; font-size:.84rem; font-weight:700; text-decoration:none; cursor:pointer; }
  .btn.primary { background:#2563eb; border-color:#2563eb; color:#fff; }
  main { width:min(1120px, calc(100vw - 32px)); margin:24px auto 44px; }
  h1 { font-size:1.55rem; color:#0f172a; }
  h2 { font-size:1rem; margin-bottom:12px; color:#1e293b; }
  h3 { font-size:.96rem; margin-bottom:5px; color:#0f172a; }
  .sub { margin-top:6px; color:#64748b; font-size:.9rem; line-height:1.55; }
  .grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:16px; margin-top:18px; }
  section { background:#fff; border:1px solid #e8ebf2; border-radius:14px; padding:18px; box-shadow:0 8px 24px rgba(15,23,42,.06); }
  section.wide { grid-column:1/-1; }
  .stats { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:10px; }
  .stat { border:1px solid #eef1f6; border-radius:12px; padding:12px; background:#f8fafc; }
  .stat small { display:block; color:#64748b; font-size:.74rem; margin-bottom:5px; }
  .stat strong { font-size:1.2rem; color:#0f172a; overflow-wrap:anywhere; }
  .filters { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:8px; align-items:end; }
  .filters label { color:#64748b; font-size:.74rem; font-weight:700; }
  .filters input { width:100%; border:1px solid #d8dee9; border-radius:8px; padding:8px 10px; font-size:.85rem; margin-top:4px; }
  .list { display:flex; flex-direction:column; gap:10px; }
  .item { border:1px solid #eef1f6; border-radius:12px; padding:12px 13px; background:#f8fafc; font-size:.86rem; line-height:1.55; }
  .item small { display:block; color:#94a3b8; margin-bottom:7px; }
  .item p { margin-top:8px; }
  .memory-card { border:1px solid #e2e8f0; border-radius:12px; padding:14px; background:#fff; box-shadow:0 5px 16px rgba(15,23,42,.04); }
  .memory-meta { color:#94a3b8; font-size:.78rem; margin-top:3px; }
  .memory-two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
  .memory-pane { border:1px solid #eef1f6; border-radius:10px; padding:12px; background:#f8fafc; }
  .memory-pane h4 { font-size:.86rem; color:#1e293b; margin-bottom:8px; }
  .feedback-empty { border:1px dashed #cbd5e1; border-radius:10px; padding:12px; background:#fff; color:#64748b; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .chip { border:1px solid #bfdbfe; background:#eff6ff; color:#1d4ed8; border-radius:999px; padding:3px 8px; font-size:.74rem; font-weight:700; }
  .notice { border:1px solid #dbeafe; background:#eff6ff; color:#1e40af; border-radius:12px; padding:10px 12px; font-size:.82rem; line-height:1.5; margin-bottom:12px; }
  .notice.cost { border-color:#fde68a; background:#fffbeb; color:#92400e; }
  .ai-buttons { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 12px; }
  .ai-result { border:1px solid #e0e7ff; background:#f8fafc; border-radius:12px; padding:13px; margin-top:10px; }
  .ai-result h3 { margin-bottom:8px; }
  .ai-result ul { margin:8px 0 0 18px; color:#334155; line-height:1.55; }
  .empty, .error { border:1px dashed #d8dee9; border-radius:12px; padding:18px; color:#64748b; background:#fff; margin-top:18px; }
  .error { border-color:#fecaca; color:#b91c1c; background:#fff7f7; }
  .actions { display:flex; flex-wrap:wrap; gap:8px; }
  .dashboard { display:grid; grid-template-columns:1.15fr .9fr .9fr; gap:14px; align-items:stretch; }
  .dash-card { border:1px solid #e8ebf2; border-radius:14px; padding:16px; background:#fff; min-height:148px; display:flex; flex-direction:column; justify-content:space-between; }
  .dash-card.primary { border-color:#bfdbfe; background:#f8fbff; }
  .dash-label { color:#64748b; font-size:.76rem; font-weight:800; margin-bottom:8px; }
  .dash-number { color:#0f172a; font-size:2rem; font-weight:850; line-height:1; }
  .dash-title { color:#0f172a; font-size:1.08rem; font-weight:850; line-height:1.25; word-break:keep-all; }
  .progress-track { height:10px; border-radius:999px; background:#eef2f7; overflow:hidden; margin:12px 0 8px; }
  .progress-fill { height:100%; border-radius:999px; background:#2563eb; }
  .progress-line { display:flex; justify-content:space-between; gap:8px; color:#64748b; font-size:.82rem; }
  .review-map-head { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; flex-wrap:wrap; }
  .review-map-filters { display:flex; gap:8px; align-items:end; flex-wrap:wrap; }
  .review-map-filters label { color:#64748b; font-size:.74rem; font-weight:700; }
  .review-map-filters input[type="text"] { width:150px; border:1px solid #d8dee9; border-radius:8px; padding:8px 10px; font-size:.85rem; margin-top:4px; }
  .review-toggle { display:flex; align-items:center; gap:6px; border:1px solid #d8dee9; border-radius:8px; padding:8px 10px; background:#fff; color:#475569; font-size:.82rem; font-weight:800; }
  .knowledge-link { border:1px solid #eef1f6; border-radius:12px; padding:13px; background:#f8fafc; margin-top:12px; display:flex; justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap; }
  .connection-grid { display:grid; grid-template-columns:1.5fr .9fr; gap:14px; align-items:stretch; }
  .connection-cards { display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:8px; margin:10px 0 12px; }
  .connection-card { border:1px solid #e2e8f0; background:#fff; border-radius:10px; padding:10px; text-align:left; color:#1f2937; }
  .connection-card small { display:block; color:#64748b; font-size:.7rem; margin-bottom:4px; }
  .connection-card strong { display:block; color:#0f172a; font-size:1rem; }
  .review-map { position:relative; min-height:300px; border:1px solid #eef1f6; border-radius:12px; background:radial-gradient(circle at 50% 45%, #fff, #f8fafc); overflow:hidden; }
  .review-map svg { width:100%; height:300px; display:block; }
  .map-edge { stroke:#cbd5e1; stroke-width:1.4; opacity:.7; }
  .map-node { cursor:pointer; }
  .map-node circle { fill:#eff6ff; stroke:#93c5fd; stroke-width:2; }
  .map-node.weak circle, .map-node.review circle { fill:#fff7ed; stroke:#f97316; }
  .map-node.new circle { fill:#f8fafc; stroke:#94a3b8; }
  .map-node.learning circle { fill:#eff6ff; stroke:#3b82f6; }
  .map-node.mastered circle { fill:#ecfdf5; stroke:#10b981; }
  .map-node.core circle { stroke:#7c3aed; }
  .map-node.bridge circle { stroke:#059669; }
  .map-node.recent circle { fill:#ecfeff; stroke:#0891b2; }
  .map-node.selected circle { fill:#dbeafe; stroke:#1d4ed8; stroke-width:3; }
  .map-node text { font-size:11px; fill:#1f2937; font-weight:700; paint-order:stroke; stroke:#fff; stroke-width:3px; }
  .connection-detail { border:1px solid #eef1f6; border-radius:12px; padding:13px; background:#f8fafc; min-height:300px; font-size:.84rem; line-height:1.55; }
  .connection-detail h3 { margin-bottom:8px; }
  .connection-detail dl { display:grid; grid-template-columns:96px 1fr; gap:7px 10px; }
  .connection-detail dt { color:#64748b; font-size:.72rem; font-weight:800; }
  .connection-detail dd { color:#111827; overflow-wrap:anywhere; }
  .overview-compact { padding:13px 18px; }
  .overview-compact h2 { margin-bottom:7px; }
  .overview-compact .sub { margin-top:0; }
  .mini-stats { display:flex; flex-wrap:wrap; gap:4px 14px; margin-top:8px; font-size:.78rem; color:#64748b; }
  .mini-stats b { color:#0f172a; font-weight:800; }
  details.cc summary { cursor:pointer; color:#1e293b; font-weight:800; font-size:.98rem; }
  details.cc[open] summary { margin-bottom:12px; }
  .review-order { margin:10px 0 0 22px; display:flex; flex-direction:column; gap:6px; color:#0f172a; font-size:.92rem; font-weight:600; }
  .search-box { border-top:1px solid #e2e8f0; margin-top:10px; padding-top:10px; }
  .search-box .item { background:#fff; }
  @media (max-width:760px){ .grid,.memory-two-col,.connection-grid,.dashboard{grid-template-columns:1fr;} .stats,.filters,.connection-cards{grid-template-columns:1fr 1fr;} .review-map-filters input[type="text"]{width:100%;} }
</style>
</head>
<body>
  <div class="topbar">
    <a class="brand" href="/">LinkNote</a>
    <span class="spacer"></span>
    <a class="btn" href="/">My Library</a>
    <a class="btn" href="/mypage.html">My Page</a>
  </div>
  <main>
    <h1>Learning Dashboard</h1>
    <p class="sub">지금 복습할 개념, 이어서 볼 개념, 전체 진행률을 먼저 보여주는 학습 시작 화면입니다.</p>
    <div id="app" class="empty">불러오는 중...</div>
  </main>
<script>
  const configuredApi = window.LINKNOTE_API_BASE || localStorage.getItem('ln_api_base') || '';
  const API = (configuredApi || (location.protocol.startsWith('http') ? '' : 'http://127.0.0.1:8000')).replace(/\/$/, '');
  const token = () => localStorage.getItem('ln_token') || '';
  const headers = () => token() ? { Authorization:'Bearer ' + token() } : {};
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const dateText = (v) => {
    if(!v) return '-';
    const d = new Date(v);
    return Number.isNaN(d.getTime()) ? String(v) : d.toLocaleString('ko-KR');
  };
  async function getJSON(path){
    const r = await fetch(API + path, { headers: headers() });
    const d = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(`${path} returned ${r.status} ${d.detail || r.statusText}`);
    return d;
  }
  async function postJSON(path, body){
    const r = await fetch(API + path, {
      method:'POST',
      headers:{ ...headers(), 'Content-Type':'application/json' },
      body:JSON.stringify(body || {})
    });
    const d = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(`${path} returned ${r.status} ${d.detail || r.statusText}`);
    return d;
  }
  const stat = (label, value) => `<div class="stat"><small>${esc(label)}</small><strong>${esc(value)}</strong></div>`;
  const chips = (items) => Array.isArray(items) && items.length
    ? `<div class="chips">${items.map(item => `<span class="chip">${esc(item.name || item.concept || item)}</span>`).join('')}</div>`
    : '<p class="sub">아직 표시할 항목이 없습니다.</p>';
  let currentMemories = [];
  function feedbackSection(item, index){
    const missing = Array.isArray(item.missing_links) ? item.missing_links : [];
    const good = Array.isArray(item.good_points) ? item.good_points : [];
    if(!item.has_ai_feedback){
      return `<div class="feedback-empty">
        아직 AI 피드백이 없습니다.
        <div class="actions" style="margin-top:10px">
          <button onclick="generateMemoryFeedback(${index})">AI 피드백 생성</button>
          <span id="feedbackStatus${index}" class="sub"></span>
        </div>
      </div>`;
    }
    return `
      ${item.feedback_text ? `<p><strong>요약 피드백</strong><br>${esc(item.feedback_text)}</p>` : ''}
      ${good.length ? `<p><strong>좋았던 점</strong></p>${chips(good)}` : ''}
      ${missing.length ? `<p><strong>더 연결해볼 점</strong></p>${chips(missing)}` : ''}
      ${item.followup_question ? `<p><strong>다시 생각해볼 질문</strong><br>${esc(item.followup_question)}</p>` : ''}
      ${item.improved_summary ? `<p><strong>개선 요약</strong><br>${esc(item.improved_summary)}</p>` : ''}
      ${item.review_hint ? `<p><strong>복습 힌트</strong><br>${esc(item.review_hint)}</p>` : ''}
      ${item.source_hint ? `<p><strong>다시 볼 자료</strong><br>${esc(item.source_hint)}</p>` : ''}
      ${item.feedback_created_at ? `<p class="sub">AI 피드백 생성: ${esc(dateText(item.feedback_created_at))}</p>` : ''}`;
  }
  function memoryCard(item, index){
    const graphUrl = `/concept-graph.html?mode=connection&concept=${encodeURIComponent(item.concept || '')}&course=${encodeURIComponent(item.course || '')}&unit=${encodeURIComponent(item.unit || '')}`;
    return `<div class="memory-card">
      <h3>${esc(item.concept || '개념 미지정')}</h3>
      <div class="memory-meta">${esc(item.course)} · ${esc(item.unit)} · ${esc(dateText(item.created_at))}</div>
      <div class="actions" style="margin-top:8px"><a class="btn" href="${graphUrl}">개념 연결 보기</a></div>
      <div class="memory-two-col">
        <section class="memory-pane">
          <h4>내 설명</h4>
          <p>${esc(item.answer_text || '')}</p>
        </section>
        <section class="memory-pane">
          <h4>AI 피드백</h4>
          ${feedbackSection(item, index)}
        </section>
      </div>
    </div>`;
  }
  function memoriesHubHTML(memories, aiSummaries){
    const items = Array.isArray(aiSummaries?.items) ? aiSummaries.items : [];
    return `<section class="wide"><h2>Learning Memories</h2>
      <div class="filters">
        <label>Course<input id="f_course" placeholder="과목"></label>
        <label>Unit<input id="f_unit" placeholder="단원"></label>
        <label>Concept Search<input id="f_concept" placeholder="개념/키워드"></label>
        <button onclick="loadMemories()">적용</button>
      </div>
      <div class="ai-buttons" style="margin-top:12px">
        <button onclick="generateAiSummary('weekly')">이번 주 요약</button>
        <button onclick="generateAiSummary('course')">과목 요약</button>
        <button onclick="generateAiSummary('exam')">시험 대비 요약</button>
        <button onclick="generateAiSummary('weak_concepts')">복습 개념 요약</button>
      </div>
      <p class="sub">조회는 무료 · 위 요약 버튼을 누를 때만 GPT 비용이 발생하며, 필터 범위로 생성됩니다.</p>
      <div id="aiSummaryStatus" class="sub"></div>
      <div class="list" style="margin-top:12px">${memories.length ? memories.map(memoryCard).join('') : '<div class="item">아직 저장된 Learning Memory가 없습니다.</div>'}</div>
      <details class="cc" style="margin-top:14px"><summary>지난 AI Summary (${items.length})</summary>
        <div class="list" style="margin-top:10px">${items.length ? items.map(aiSummaryCard).join('') : '<div class="item">저장된 AI Summary가 없습니다.</div>'}</div>
      </details>
    </section>`;
  }
  const listItems = (items) => Array.isArray(items) && items.length
    ? `<ul>${items.map(item => `<li>${esc(item)}</li>`).join('')}</ul>`
    : '<p class="sub">아직 표시할 항목이 없습니다.</p>';
  let currentGraphOverview = { nodes:[], edges:[], stats:{} };
  let selectedConnectionNodeId = '';

  const nodeLabel = node => String(node?.label || node?.name || '').trim();
  const hasNodeType = (node, type) => Array.isArray(node?.node_types) && node.node_types.includes(type);
  const learningState = node => String(node?.learning_state || (Number(node?.recall_count || 0) === 0 ? 'NEW' : (hasNodeType(node, 'weak') ? 'REVIEW' : 'LEARNING'))).toUpperCase();
  const reviewPriority = node => Number.isFinite(Number(node?.review_priority)) ? Number(node.review_priority) : (learningState(node) === 'NEW' ? 70 : Number(node?.review_score || 0));
  const nodeScore = (node) => reviewPriority(node) * 2 + Number(node?.centrality_score || 0) * 0.25 + Number(node?.bridge_score || 0) * 0.15;
  const compactNodes = (graphData) => {
    const nodes = Array.isArray(graphData?.nodes) ? graphData.nodes : [];
    return [...nodes].sort((a,b)=>nodeScore(b)-nodeScore(a)).slice(0, 15);
  };
  const compactEdges = (graphData, nodes) => {
    const ids = new Set(nodes.map(n => n.id));
    return (Array.isArray(graphData?.edges) ? graphData.edges : [])
      .filter(edge => ids.has(edge.source) && ids.has(edge.target))
      .sort((a,b)=>Number(b.normalized_weight || b.weight || 0)-Number(a.normalized_weight || a.weight || 0))
      .slice(0, 22);
  };
  function learningProgressData(summary, graphData){
    const total = Number(graphData?.stats?.node_count || 0);
    const explained = Number(summary.concepts_explained || 0);
    const percent = total ? Math.min(100, Math.round((explained / total) * 100)) : 0;
    return { learned: explained, total, percent };
  }
  function activeReviewItems(dueData, graphData){
    const dueItems = Array.isArray(dueData?.items) ? dueData.items : [];
    const explicitlyDue = dueItems.filter(item => item.is_due);
    if(explicitlyDue.length) return explicitlyDue;
    if(dueItems.length) return dueItems.slice(0, 7);
    const nodes = compactNodes(graphData).filter(node => learningState(node) !== 'MASTERED');
    return nodes.slice(0, 7).map(node => ({
      concept_id: node.id,
      concept: nodeLabel(node),
      course: node.course || '',
      unit: node.unit || ''
    }));
  }
  function conceptStudyUrl(item){
    const concept = encodeURIComponent(item?.concept || item?.label || '');
    const course = encodeURIComponent(item?.course || '');
    const unit = encodeURIComponent(item?.unit || '');
    return `/?course=${course}&unit=${unit}&concept=${concept}&action=recall`;
  }
  function dashboardHTML(summary, memories, graphData, dueData){
    const reviewItems = activeReviewItems(dueData, graphData);
    const progress = learningProgressData(summary, graphData);
    const recent = memories[0] || null;
    return `<section class="wide"><div class="dashboard">
      <div class="dash-card primary">
        <div>
          <div class="dash-label">Today's Review</div>
          <div class="dash-number">${esc(reviewItems.length)}</div>
          <p class="sub">${reviewItems.length ? '지금 복습할 개념이 준비되어 있습니다.' : '오늘은 새 설명을 남기며 시작해도 좋습니다.'}</p>
        </div>
        <button class="primary" onclick="startReview()">Start Review</button>
      </div>
      <div class="dash-card">
        <div>
          <div class="dash-label">Learning Progress</div>
          <div class="dash-title">${esc(progress.percent)}%</div>
          <div class="progress-track"><div class="progress-fill" style="width:${esc(progress.percent)}%"></div></div>
          <div class="progress-line"><span>Learned ${esc(progress.learned)}</span><span>Total ${esc(progress.total)}</span></div>
        </div>
      </div>
      <div class="dash-card">
        <div>
          <div class="dash-label">Continue Learning</div>
          <div class="dash-title">${esc(recent?.concept || '아직 최근 학습이 없습니다')}</div>
          <p class="sub">${recent ? esc(dateText(recent.created_at)) : '설명해보기를 시작하면 이어서 학습할 개념이 표시됩니다.'}</p>
        </div>
        ${recent ? `<a class="btn" href="${conceptStudyUrl(recent)}">Continue</a>` : '<a class="btn" href="/">My Library</a>'}
      </div>
    </div></section>`;
  }
  function reviewMapHTML(graphData){
    const nodes = compactNodes(graphData);
    return `<section class="wide"><div class="review-map-head">
      <div>
        <h2>Review Map</h2>
        <p class="sub">복습 결정을 돕는 작은 지도입니다. 전체 탐색은 Knowledge Exploration에서 볼 수 있습니다.</p>
      </div>
      <div class="review-map-filters">
        <label>Course<input id="rm_course" type="text" placeholder="과목"></label>
        <label>Unit<input id="rm_unit" type="text" placeholder="단원"></label>
        <label class="review-toggle"><input id="rm_review_needed" type="checkbox" checked> Review Needed Only</label>
        <button onclick="applyReviewMapFilters()">적용</button>
      </div>
    </div>
      <div class="connection-grid">
        <div><div id="reviewMap" class="review-map">${nodes.length ? '' : '<div class="empty">아직 표시할 개념 연결이 없습니다.</div>'}</div>
        </div>
        <div id="connectionDetail" class="connection-detail">노드를 클릭하면 설명, 피드백, 빠른 검색 액션이 표시됩니다.</div>
      </div>
      <div class="knowledge-link">
        <div>
          <strong>Knowledge Exploration</strong>
          <p class="sub">전체 그래프, 노드 연결, edge 관계, 탐색 필터는 별도 화면에서 확인합니다.</p>
        </div>
        <a class="btn" href="/concept-graph.html?mode=review">Open Knowledge Exploration</a>
      </div>
    </section>`;
  }
  function matchingMemoryForNode(node){
    const label = nodeLabel(node).toLowerCase();
    if(!label) return null;
    return currentMemories.find(item => String(item.concept || '').trim().toLowerCase() === label)
      || currentMemories.find(item => {
        const concept = String(item.concept || '').trim().toLowerCase();
        return concept && (concept.includes(label) || label.includes(concept));
      });
  }
  function drawReviewMap(graphData){
    const wrap = document.getElementById('reviewMap');
    if(!wrap) return;
    const nodes = compactNodes(graphData);
    if(!nodes.length) return;
    const edges = compactEdges(graphData, nodes);
    const width = Math.max(620, wrap.clientWidth || 620), height = 300;
    const cx = width / 2, cy = height / 2;
    const radius = Math.min(width, height) * 0.36;
    const pos = {};
    nodes.forEach((node, i) => {
      const angle = (Math.PI * 2 * i) / Math.max(nodes.length, 1) - Math.PI / 2;
      const inner = i === 0 ? 0 : radius * (0.58 + (i % 3) * 0.15);
      pos[node.id] = { x: cx + Math.cos(angle) * inner, y: cy + Math.sin(angle) * inner };
    });
    const edgeLines = edges.map(edge => {
      const a = pos[edge.source], b = pos[edge.target];
      return a && b ? `<line class="map-edge" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"></line>` : '';
    }).join('');
    const nodeEls = nodes.map(node => {
      const p = pos[node.id] || {x:cx,y:cy};
      const cls = ['map-node', learningState(node).toLowerCase(), learningState(node) === 'REVIEW' ? 'review' : '', hasNodeType(node,'core') ? 'core' : '', hasNodeType(node,'bridge') ? 'bridge' : '', hasNodeType(node,'recent') ? 'recent' : '', selectedConnectionNodeId === node.id ? 'selected' : ''].filter(Boolean).join(' ');
      const r = 17 + Math.min(8, Number(node.weight || 1) * 1.2);
      return `<g class="${cls}" data-id="${esc(node.id)}" onclick="selectConnectionNode('${esc(node.id)}')" transform="translate(${p.x},${p.y})"><circle r="${r}"></circle><text text-anchor="middle" y="4">${esc(nodeLabel(node).slice(0, 12))}</text></g>`;
    }).join('');
    wrap.innerHTML = `<svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Compact review map">${edgeLines}${nodeEls}</svg>`;
    if(!selectedConnectionNodeId && nodes[0]) selectedConnectionNodeId = nodes[0].id;
    if(selectedConnectionNodeId) renderConnectionDetail(selectedConnectionNodeId);
  }
  function selectConnectionNode(id){
    selectedConnectionNodeId = id || '';
    drawReviewMap(currentGraphOverview);
    renderConnectionDetail(selectedConnectionNodeId);
  }
  function feedbackPreview(memory){
    if(!memory) return '관련 Learning Memory가 아직 없습니다.';
    const missing = Array.isArray(memory.missing_links) ? memory.missing_links.slice(0,3).join(' · ') : '';
    return memory.feedback_text || memory.improved_summary || missing || (memory.has_ai_feedback ? '저장된 AI 피드백이 있습니다.' : 'AI 피드백이 아직 없습니다.');
  }
  function renderConnectionDetail(id){
    const box = document.getElementById('connectionDetail');
    if(!box) return;
    const node = (currentGraphOverview.nodes || []).find(n => String(n.id || '') === String(id || '')) || compactNodes(currentGraphOverview)[0];
    if(!node){ box.textContent = '표시할 개념 연결이 없습니다.'; return; }
    const memory = matchingMemoryForNode(node);
    const concept = encodeURIComponent(nodeLabel(node));
    const course = encodeURIComponent(node.course || '');
    const unit = encodeURIComponent(node.unit || '');
    const reasons = Array.isArray(node.review_reason) && node.review_reason.length ? `<ul>${node.review_reason.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>` : '<span class="sub">최근 학습 기록을 기준으로 추천할 내용이 아직 없습니다.</span>';
    box.innerHTML = `<h3>${esc(nodeLabel(node) || 'Concept')}</h3><dl>
      <dt>Concept</dt><dd>${esc(nodeLabel(node) || '-')}</dd>
      <dt>Why now?</dt><dd>${reasons}</dd>
      <dt>My explanation</dt><dd>${esc(memory?.answer_text || '아직 이 개념으로 남긴 설명이 없습니다.')}</dd>
      <dt>AI feedback</dt><dd>${esc(feedbackPreview(memory))}</dd>
      <dt>Learning Memory</dt><dd>${memory ? esc(dateText(memory.created_at)) : '새 설명을 남기면 Learning Memory에 쌓입니다.'}</dd>
    </dl>
    <div class="actions" style="margin-top:12px">
      <a class="btn" href="/learning-memory.html?concept=${concept}&course=${course}&unit=${unit}">Learning Memory</a>
      <button onclick="quickSearchConnectionNode('${esc(node.id)}')">Fast Search</button>
      <a class="btn" href="/?course=${course}&unit=${unit}&concept=${concept}&action=recall">Explain Again</a>
    </div>
    <div id="connectionSearchResults" class="search-box"></div>`;
  }
  async function quickSearchConnectionNode(id){
    const node = (currentGraphOverview.nodes || []).find(n => String(n.id || '') === String(id || ''));
    const target = document.getElementById('connectionSearchResults');
    if(!node || !target) return;
    target.innerHTML = '<p class="sub">Fast Search 중...</p>';
    const search_filter = {};
    if(node.course) search_filter.course = node.course;
    if(node.unit) search_filter.unit = node.unit;
    try{
      const r = await fetch(API + '/ask/search', {
        method:'POST', headers:{...headers(), 'Content-Type':'application/json'},
        body:JSON.stringify({ question:`${nodeLabel(node)} 관련 자료 찾아줘`, scope:Object.keys(search_filter).length ? 'single' : 'multi', search_filter, limit:3 })
      });
      const d = await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(d.detail || r.statusText);
      const sources = Array.isArray(d.sources) ? d.sources : [];
      const memories = Array.isArray(d.learning_memory_matches) ? d.learning_memory_matches : [];
      target.innerHTML = `<div class="item"><strong>Related Sources</strong>${sources.slice(0,3).map(x=>`<small>${esc(x.filename || '')} · ${esc(x.course || '')} · p.${esc(x.page || '-')}</small><div>${esc(x.chunk_preview || '')}</div>`).join('') || '<small>관련 자료 없음</small>'}</div><div class="item"><strong>Related Learning Memory</strong>${memories.slice(0,3).map(x=>`<small>${esc(x.concept || '')} · ${esc(x.course || '')}</small><div>${esc(x.improved_summary || x.answer_preview || '')}</div>`).join('') || '<small>관련 Learning Memory 없음</small>'}</div>`;
    }catch(e){ target.innerHTML = `<div class="error">Fast Search 실패: ${esc(e.message || e)}</div>`; }
  }

  function aiSummaryCard(item){
    return `<div class="ai-result">
      <div class="actions" style="justify-content:space-between; align-items:center; margin-bottom:8px">
        <h3 style="margin-bottom:0">${esc(item.title || 'AI Summary')}</h3>
        <button onclick="deleteAiSummary('${esc(item.id || '')}')">삭제</button>
      </div>
      <small>${esc(item.summary_type || '')} · ${esc(dateText(item.created_at))}</small>
      <p style="margin-top:8px">${esc(item.summary || '')}</p>
      <p class="sub">Review Focus</p>${listItems(item.review_focus || [])}
      <p class="sub" style="margin-top:8px">Review Concepts</p>${listItems(item.weak_concepts || [])}
      <p class="sub" style="margin-top:8px">Suggested Questions</p>${listItems(item.suggested_questions || [])}
    </div>`;
  }
  function reviewGuideHTML(summary){
    const order = (Array.isArray(summary.exam_review_focus) && summary.exam_review_focus.length ? summary.exam_review_focus : summary.weak_concepts) || [];
    const missing = Array.isArray(summary.frequent_missing_links) ? summary.frequent_missing_links : [];
    const steps = order.slice(0, 5).map(c => `<li>${esc(c.name || c.concept || c)}</li>`).join('');
    return `<section class="wide"><h2>오늘의 복습</h2>
      <p class="sub">우선순위가 높은 개념부터 최대 5개만 보여줍니다.</p>
      ${steps ? `<ol class="review-order">${steps}</ol>` : '<p class="sub">아직 복습할 개념이 없습니다. 설명해보기를 사용하면 여기에 쌓입니다.</p>'}
      ${missing.length ? `<p class="sub" style="margin-top:10px">자주 빠지는 연결</p>${chips(missing.slice(0, 6))}` : ''}
    </section>`;
  }
  function render(summary, data, aiSummaries, graphData, dueData){
    const memories = Array.isArray(data.items) ? data.items : [];
    currentMemories = memories;
    currentGraphOverview = graphData || { nodes:[], edges:[], stats:{} };
    const app = document.getElementById('app');
    app.className = 'grid';
    app.innerHTML = `
      ${dashboardHTML(summary, memories, currentGraphOverview, dueData)}
      ${reviewMapHTML(currentGraphOverview)}
      ${memoriesHubHTML(memories, aiSummaries)}
      <section class="wide">
        <h2>Knowledge Exploration</h2>
        <p class="sub">전체 지식 그래프, node connections, edge relationships, graph filters는 탐색 전용 화면에서 확인합니다.</p>
        <div class="actions" style="margin-top:12px"><a class="btn" href="/concept-graph.html?mode=review">Open Knowledge Exploration</a></div>
      </section>`;
    restoreFilters();
    drawReviewMap(currentGraphOverview);
  }
  function restoreFilters(){
    for(const id of ['f_course','f_unit','f_concept']){
      const el = document.getElementById(id);
      if(el && window._lmFilters) el.value = window._lmFilters[id] || '';
    }
    for(const id of ['rm_course','rm_unit']){
      const el = document.getElementById(id);
      if(el && window._reviewMapFilters) el.value = window._reviewMapFilters[id] || '';
    }
    const reviewNeeded = document.getElementById('rm_review_needed');
    if(reviewNeeded && window._reviewMapFilters) reviewNeeded.checked = window._reviewMapFilters.rm_review_needed !== false;
  }
  function reviewMapParams(){
    const saved = window._reviewMapFilters || {};
    const course = document.getElementById('rm_course')?.value.trim() || saved.rm_course || '';
    const unit = document.getElementById('rm_unit')?.value.trim() || saved.rm_unit || '';
    const reviewOnly = document.getElementById('rm_review_needed') ? document.getElementById('rm_review_needed').checked : saved.rm_review_needed !== false;
    window._reviewMapFilters = { rm_course:course, rm_unit:unit, rm_review_needed:reviewOnly };
    const params = new URLSearchParams();
    if(course) params.set('course', course);
    if(unit) params.set('unit', unit);
    if(reviewOnly) params.set('weak_only', 'true');
    return params;
  }
  async function applyReviewMapFilters(){
    await loadMemories();
  }
  async function loadMemories(){
    const saved = window._lmFilters || {};
    const course = document.getElementById('f_course')?.value.trim() || saved.f_course || '';
    const unit = document.getElementById('f_unit')?.value.trim() || saved.f_unit || '';
    const concept = document.getElementById('f_concept')?.value.trim() || saved.f_concept || '';
    window._lmFilters = { f_course:course, f_unit:unit, f_concept:concept };
    const params = new URLSearchParams({ limit:'50' });
    if(course) params.set('course', course);
    if(unit) params.set('unit', unit);
    if(concept) params.set('concept', concept);
    const reviewParams = reviewMapParams();
    const dueParams = new URLSearchParams({ limit:'20' });
    const reviewCourse = window._reviewMapFilters?.rm_course || '';
    const reviewUnit = window._reviewMapFilters?.rm_unit || '';
    if(reviewCourse) dueParams.set('course', reviewCourse);
    if(reviewUnit) dueParams.set('unit', reviewUnit);
    const [summary, data, aiSummaries, graphData, dueData] = await Promise.all([
      getJSON('/learning-memory/summary'),
      getJSON('/learning-memory?' + params.toString()),
      getJSON('/learning-memory/ai-summaries?limit=10'),
      getJSON('/concept-graph/overview' + (reviewParams.toString() ? '?' + reviewParams.toString() : '')).catch(()=>({ nodes:[], edges:[], stats:{} })),
      getJSON('/review/due?' + dueParams.toString()).catch(()=>({ items: [] })),
    ]);
    render(summary, data, aiSummaries, graphData, dueData);
  }
  async function startReview(){
    const statusTarget = document.getElementById('app');
    const scope = {};
    const course = window._reviewMapFilters?.rm_course || '';
    const unit = window._reviewMapFilters?.rm_unit || '';
    if(course) scope.course = course;
    if(unit) scope.unit = unit;
    try {
      const session = await postJSON('/learning-session/start', { scope, size:7 });
      const first = Array.isArray(session.items) ? session.items[0] : null;
      if(first){
        location.href = conceptStudyUrl(first) + `&session=${encodeURIComponent(session.id || '')}`;
      } else {
        alert('복습 세션을 시작할 개념이 아직 없습니다.');
      }
    } catch(e) {
      if(statusTarget) statusTarget.insertAdjacentHTML('afterbegin', `<div class="error">Review를 시작하지 못했습니다: ${esc(e.message || e)}</div>`);
    }
  }
  async function generateAiSummary(type){
    if(!confirm('AI Summary 생성은 GPT API 호출로 비용이 발생할 수 있습니다.\n계속할까요?')) return;
    const status = document.getElementById('aiSummaryStatus');
    const course = document.getElementById('f_course')?.value.trim() || '';
    const unit = document.getElementById('f_unit')?.value.trim() || '';
    const concept = document.getElementById('f_concept')?.value.trim() || '';
    const body = { summary_type:type, max_items:30 };
    if(course) body.course = course;
    if(unit) body.unit = unit;
    if(concept) body.concepts = [concept];
    if(status) status.textContent = 'AI Summary 생성 중... API 비용이 발생할 수 있습니다.';
    try {
      await postJSON('/learning-memory/ai-summary', body);
      if(status) status.textContent = 'AI Summary를 저장했습니다.';
      await loadMemories();
    } catch(e) {
      if(status) status.textContent = 'AI Summary를 생성하지 못했습니다: ' + e.message;
    }
  }
  async function generateMemoryFeedback(index){
    const item = currentMemories[index];
    const status = document.getElementById('feedbackStatus' + index);
    if(!item) return;
    if(!confirm('AI 피드백 생성은 GPT API 호출로 비용이 발생할 수 있습니다.\n계속할까요?')) return;
    if(status) status.textContent = 'AI 피드백 생성 중... API 비용이 발생할 수 있습니다.';
    try {
      await postJSON('/recall-feedback', {
        semester:item.semester,
        course:item.course,
        unit:item.unit,
        concept:item.concept,
        answer_text:item.answer_text,
        trace_id:item.id
      });
      if(status) status.textContent = 'AI 피드백을 저장했습니다.';
      await loadMemories();
    } catch(e) {
      if(status) status.textContent = 'AI 피드백을 생성하지 못했습니다: ' + e.message;
    }
  }
  async function deleteAiSummary(id){
    if(!id) return;
    if(!confirm('이 AI Summary를 삭제할까요?')) return;
    try {
      const r = await fetch(API + '/learning-memory/ai-summaries/' + encodeURIComponent(id), {
        method:'DELETE',
        headers: headers(),
      });
      const d = await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(d.detail || r.statusText);
      await loadMemories();
    } catch(e) {
      alert('AI Summary 삭제에 실패했습니다: ' + (e.message || e));
    }
  }
  async function init(){
    const app = document.getElementById('app');
    if(!token()) { app.className='error'; app.textContent='로그인이 필요합니다. Gallery에서 먼저 로그인해주세요.'; return; }
    const params = new URLSearchParams(location.search);
    window._lmFilters = {
      f_course: params.get('course') || '',
      f_unit: params.get('unit') || '',
      f_concept: params.get('concept') || ''
    };
    window._reviewMapFilters = {
      rm_course: params.get('course') || '',
      rm_unit: params.get('unit') || '',
      rm_review_needed: params.get('review_needed') !== 'false'
    };
    try { await loadMemories(); }
    catch(e){ app.className='error'; app.textContent='Learning Memory를 불러오지 못했습니다: ' + e.message; }
  }
  init();
</script>
</body>
