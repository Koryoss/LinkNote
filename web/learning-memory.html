<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkNote · Learning Memory</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; background:#fbfcfe; color:#1f2937; }
  .topbar { position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:10px; padding:12px 24px; background:rgba(255,255,255,.94); backdrop-filter:blur(6px); border-bottom:1px solid #eef1f6; }
  .brand { font-size:1.18rem; font-weight:800; color:#1e293b; text-decoration:none; }
  .spacer { flex:1; }
  .btn, button { border:1px solid #d8dee9; background:#fff; color:#2563eb; border-radius:8px; padding:8px 12px; font-size:.84rem; font-weight:700; text-decoration:none; cursor:pointer; }
  .btn.primary { background:#2563eb; border-color:#2563eb; color:#fff; }
  main { width:min(1120px, calc(100vw - 32px)); margin:24px auto 44px; }
  h1 { font-size:1.55rem; color:#0f172a; }
  h2 { font-size:1rem; margin-bottom:12px; color:#1e293b; }
  h3 { font-size:.96rem; margin-bottom:5px; color:#0f172a; }
  .sub { margin-top:6px; color:#64748b; font-size:.9rem; line-height:1.55; }
  .grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:16px; margin-top:18px; }
  section { background:#fff; border:1px solid #e8ebf2; border-radius:14px; padding:18px; box-shadow:0 8px 24px rgba(15,23,42,.06); }
  section.wide { grid-column:1/-1; }
  .stats { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:10px; }
  .stat { border:1px solid #eef1f6; border-radius:12px; padding:12px; background:#f8fafc; }
  .stat small { display:block; color:#64748b; font-size:.74rem; margin-bottom:5px; }
  .stat strong { font-size:1.2rem; color:#0f172a; overflow-wrap:anywhere; }
  .filters { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:8px; align-items:end; }
  .filters label { color:#64748b; font-size:.74rem; font-weight:700; }
  .filters input { width:100%; border:1px solid #d8dee9; border-radius:8px; padding:8px 10px; font-size:.85rem; margin-top:4px; }
  .list { display:flex; flex-direction:column; gap:10px; }
  .item { border:1px solid #eef1f6; border-radius:12px; padding:12px 13px; background:#f8fafc; font-size:.86rem; line-height:1.55; }
  .item small { display:block; color:#94a3b8; margin-bottom:7px; }
  .item p { margin-top:8px; }
  .memory-card { border:1px solid #e2e8f0; border-radius:12px; padding:14px; background:#fff; box-shadow:0 5px 16px rgba(15,23,42,.04); }
  .memory-meta { color:#94a3b8; font-size:.78rem; margin-top:3px; }
  .memory-two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
  .memory-pane { border:1px solid #eef1f6; border-radius:10px; padding:12px; background:#f8fafc; }
  .memory-pane h4 { font-size:.86rem; color:#1e293b; margin-bottom:8px; }
  .feedback-empty { border:1px dashed #cbd5e1; border-radius:10px; padding:12px; background:#fff; color:#64748b; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .chip { border:1px solid #bfdbfe; background:#eff6ff; color:#1d4ed8; border-radius:999px; padding:3px 8px; font-size:.74rem; font-weight:700; }
  .notice { border:1px solid #dbeafe; background:#eff6ff; color:#1e40af; border-radius:12px; padding:10px 12px; font-size:.82rem; line-height:1.5; margin-bottom:12px; }
  .notice.cost { border-color:#fde68a; background:#fffbeb; color:#92400e; }
  .ai-buttons { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 12px; }
  .ai-result { border:1px solid #e0e7ff; background:#f8fafc; border-radius:12px; padding:13px; margin-top:10px; }
  .ai-result h3 { margin-bottom:8px; }
  .ai-result ul { margin:8px 0 0 18px; color:#334155; line-height:1.55; }
  .empty, .error { border:1px dashed #d8dee9; border-radius:12px; padding:18px; color:#64748b; background:#fff; margin-top:18px; }
  .error { border-color:#fecaca; color:#b91c1c; background:#fff7f7; }
  .actions { display:flex; flex-wrap:wrap; gap:8px; }
  @media (max-width:760px){ .grid,.memory-two-col{grid-template-columns:1fr;} .stats,.filters{grid-template-columns:1fr 1fr;} }
</style>
</head>
<body>
  <div class="topbar">
    <a class="brand" href="/">LinkNote</a>
    <span class="spacer"></span>
    <a class="btn" href="/">Gallery</a>
    <a class="btn" href="/mypage.html">My Page</a>
  </div>
  <main>
    <h1>Learning Memory</h1>
    <p class="sub">설명해보기로 남긴 내 설명과 피드백을 강의 복습, 주간 복습, 시험 준비에 다시 쓸 수 있게 모아봅니다.</p>
    <div id="app" class="empty">불러오는 중...</div>
  </main>
<script>
  const configuredApi = window.LINKNOTE_API_BASE || localStorage.getItem('ln_api_base') || '';
  const API = (configuredApi || (location.protocol.startsWith('http') ? '' : 'http://127.0.0.1:8000')).replace(/\/$/, '');
  const token = () => localStorage.getItem('ln_token') || '';
  const headers = () => token() ? { Authorization:'Bearer ' + token() } : {};
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const dateText = (v) => {
    if(!v) return '-';
    const d = new Date(v);
    return Number.isNaN(d.getTime()) ? String(v) : d.toLocaleString('ko-KR');
  };
  async function getJSON(path){
    const r = await fetch(API + path, { headers: headers() });
    const d = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(`${path} returned ${r.status} ${d.detail || r.statusText}`);
    return d;
  }
  async function postJSON(path, body){
    const r = await fetch(API + path, {
      method:'POST',
      headers:{ ...headers(), 'Content-Type':'application/json' },
      body:JSON.stringify(body || {})
    });
    const d = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(`${path} returned ${r.status} ${d.detail || r.statusText}`);
    return d;
  }
  const stat = (label, value) => `<div class="stat"><small>${esc(label)}</small><strong>${esc(value)}</strong></div>`;
  const chips = (items) => Array.isArray(items) && items.length
    ? `<div class="chips">${items.map(item => `<span class="chip">${esc(item.name || item.concept || item)}</span>`).join('')}</div>`
    : '<p class="sub">아직 표시할 항목이 없습니다.</p>';
  let currentMemories = [];
  function feedbackSection(item, index){
    const missing = Array.isArray(item.missing_links) ? item.missing_links : [];
    const good = Array.isArray(item.good_points) ? item.good_points : [];
    if(!item.has_ai_feedback){
      return `<div class="feedback-empty">
        아직 AI 피드백이 없습니다.
        <div class="actions" style="margin-top:10px">
          <button onclick="generateMemoryFeedback(${index})">AI 피드백 생성</button>
          <span id="feedbackStatus${index}" class="sub"></span>
        </div>
      </div>`;
    }
    return `
      ${item.feedback_text ? `<p><strong>요약 피드백</strong><br>${esc(item.feedback_text)}</p>` : ''}
      ${good.length ? `<p><strong>좋았던 점</strong></p>${chips(good)}` : ''}
      ${missing.length ? `<p><strong>더 연결해볼 점</strong></p>${chips(missing)}` : ''}
      ${item.followup_question ? `<p><strong>다시 생각해볼 질문</strong><br>${esc(item.followup_question)}</p>` : ''}
      ${item.improved_summary ? `<p><strong>개선 요약</strong><br>${esc(item.improved_summary)}</p>` : ''}
      ${item.review_hint ? `<p><strong>복습 힌트</strong><br>${esc(item.review_hint)}</p>` : ''}
      ${item.source_hint ? `<p><strong>다시 볼 자료</strong><br>${esc(item.source_hint)}</p>` : ''}
      ${item.feedback_created_at ? `<p class="sub">AI 피드백 생성: ${esc(dateText(item.feedback_created_at))}</p>` : ''}`;
  }
  function memoryCard(item, index){
    const graphUrl = `/concept-graph.html?mode=connection&concept=${encodeURIComponent(item.concept || '')}&course=${encodeURIComponent(item.course || '')}&unit=${encodeURIComponent(item.unit || '')}`;
    return `<div class="memory-card">
      <h3>${esc(item.concept || '개념 미지정')}</h3>
      <div class="memory-meta">${esc(item.course)} · ${esc(item.unit)} · ${esc(dateText(item.created_at))}</div>
      <div class="actions" style="margin-top:8px"><a class="btn" href="${graphUrl}">이 개념 그래프로 보기</a></div>
      <div class="memory-two-col">
        <section class="memory-pane">
          <h4>내 설명</h4>
          <p>${esc(item.answer_text || '')}</p>
        </section>
        <section class="memory-pane">
          <h4>AI 피드백</h4>
          ${feedbackSection(item, index)}
        </section>
      </div>
    </div>`;
  }
  function filtersHTML(){
    return `<section class="wide"><h2>Filters</h2><div class="filters">
      <label>Course<input id="f_course" placeholder="과목"></label>
      <label>Unit<input id="f_unit" placeholder="단원"></label>
      <label>Concept Search<input id="f_concept" placeholder="개념/키워드"></label>
      <button onclick="loadMemories()">적용</button>
    </div></section>`;
  }
  const listItems = (items) => Array.isArray(items) && items.length
    ? `<ul>${items.map(item => `<li>${esc(item)}</li>`).join('')}</ul>`
    : '<p class="sub">아직 표시할 항목이 없습니다.</p>';
  function aiSummaryCard(item){
    return `<div class="ai-result">
      <h3>${esc(item.title || 'AI Summary')}</h3>
      <small>${esc(item.summary_type || '')} · ${esc(dateText(item.created_at))}</small>
      <p style="margin-top:8px">${esc(item.summary || '')}</p>
      <p class="sub">Review Focus</p>${listItems(item.review_focus || [])}
      <p class="sub" style="margin-top:8px">Weak Concepts</p>${listItems(item.weak_concepts || [])}
      <p class="sub" style="margin-top:8px">Suggested Questions</p>${listItems(item.suggested_questions || [])}
    </div>`;
  }
  function aiSummaryHTML(aiSummaries){
    const items = Array.isArray(aiSummaries?.items) ? aiSummaries.items : [];
    return `<section class="wide">
      <h2>AI Summary</h2>
      <div class="notice">Learning Memory 조회: GPT 호출 없음</div>
      <div class="notice cost">AI Summary 생성: GPT 호출 · 버튼을 누를 때만 API 비용이 발생합니다.</div>
      <div class="notice cost">AI 피드백 생성: GPT 호출 · 피드백 없는 카드에서 버튼을 누를 때만 API 비용이 발생합니다.</div>
      <div class="ai-buttons">
        <button onclick="generateAiSummary('weekly')">이번 주 요약 생성</button>
        <button onclick="generateAiSummary('course')">과목 요약 생성</button>
        <button onclick="generateAiSummary('exam')">시험 대비 요약 생성</button>
        <button onclick="generateAiSummary('weak_concepts')">약한 개념 요약 생성</button>
      </div>
      <div id="aiSummaryStatus" class="sub"></div>
      <h3 style="margin-top:12px">Previous AI Summaries</h3>
      <div class="list">${items.length ? items.map(aiSummaryCard).join('') : '<div class="item">저장된 AI Summary가 없습니다.</div>'}</div>
    </section>`;
  }
  function render(summary, data, aiSummaries){
    const memories = Array.isArray(data.items) ? data.items : [];
    currentMemories = memories;
    const app = document.getElementById('app');
    app.className = 'grid';
    app.innerHTML = `
      <section class="wide"><h2>Overview</h2><div class="stats">
        ${stat('total memories', summary.total_memories || 0)}
        ${stat('concepts explained', summary.concepts_explained || 0)}
        ${stat('weak concepts', (summary.weak_concepts || []).length)}
        ${stat('recent activity', (summary.recent_memories || []).length)}
      </div><p class="sub" style="margin-top:10px">${esc(summary.weekly_summary || '')}</p></section>
      <section><h2>Review Focus</h2>
        <p class="sub">Frequent Missing Links</p>${chips(summary.frequent_missing_links || [])}
        <p class="sub" style="margin-top:12px">Weak Concepts</p>${chips(summary.weak_concepts || [])}
      </section>
      <section><h2>Exam Review Focus</h2>${chips(summary.exam_review_focus || [])}</section>
      ${filtersHTML()}
      ${aiSummaryHTML(aiSummaries)}
      <section class="wide"><h2>Recent Learning Memories</h2><div class="list">${memories.length ? memories.map(memoryCard).join('') : '<div class="item">아직 저장된 Learning Memory가 없습니다.</div>'}</div></section>
      <section class="wide"><h2>Actions</h2><div class="actions">
        <a class="btn primary" href="/">Back to Gallery</a>
        <a class="btn" href="/mypage.html">My Page</a>
        <a class="btn" href="/concept-graph.html?mode=review">복습 지도 보기</a>
      </div></section>`;
    restoreFilters();
  }
  function restoreFilters(){
    for(const id of ['f_course','f_unit','f_concept']){
      const el = document.getElementById(id);
      if(el && window._lmFilters) el.value = window._lmFilters[id] || '';
    }
  }
  async function loadMemories(){
    const saved = window._lmFilters || {};
    const course = document.getElementById('f_course')?.value.trim() || saved.f_course || '';
    const unit = document.getElementById('f_unit')?.value.trim() || saved.f_unit || '';
    const concept = document.getElementById('f_concept')?.value.trim() || saved.f_concept || '';
    window._lmFilters = { f_course:course, f_unit:unit, f_concept:concept };
    const params = new URLSearchParams({ limit:'50' });
    if(course) params.set('course', course);
    if(unit) params.set('unit', unit);
    if(concept) params.set('concept', concept);
    const [summary, data, aiSummaries] = await Promise.all([
      getJSON('/learning-memory/summary'),
      getJSON('/learning-memory?' + params.toString()),
      getJSON('/learning-memory/ai-summaries?limit=10'),
    ]);
    render(summary, data, aiSummaries);
  }
  async function generateAiSummary(type){
    const status = document.getElementById('aiSummaryStatus');
    const course = document.getElementById('f_course')?.value.trim() || '';
    const unit = document.getElementById('f_unit')?.value.trim() || '';
    const concept = document.getElementById('f_concept')?.value.trim() || '';
    const body = { summary_type:type, max_items:30 };
    if(course) body.course = course;
    if(unit) body.unit = unit;
    if(concept) body.concepts = [concept];
    if(status) status.textContent = 'AI Summary 생성 중... API 비용이 발생할 수 있습니다.';
    try {
      await postJSON('/learning-memory/ai-summary', body);
      if(status) status.textContent = 'AI Summary를 저장했습니다.';
      await loadMemories();
    } catch(e) {
      if(status) status.textContent = 'AI Summary를 생성하지 못했습니다: ' + e.message;
    }
  }
  async function generateMemoryFeedback(index){
    const item = currentMemories[index];
    const status = document.getElementById('feedbackStatus' + index);
    if(!item) return;
    if(status) status.textContent = 'AI 피드백 생성 중... API 비용이 발생할 수 있습니다.';
    try {
      await postJSON('/recall-feedback', {
        semester:item.semester,
        course:item.course,
        unit:item.unit,
        concept:item.concept,
        answer_text:item.answer_text,
        trace_id:item.id
      });
      if(status) status.textContent = 'AI 피드백을 저장했습니다.';
      await loadMemories();
    } catch(e) {
      if(status) status.textContent = 'AI 피드백을 생성하지 못했습니다: ' + e.message;
    }
  }
  async function init(){
    const app = document.getElementById('app');
    if(!token()) { app.className='error'; app.textContent='로그인이 필요합니다. Gallery에서 먼저 로그인해주세요.'; return; }
    const params = new URLSearchParams(location.search);
    window._lmFilters = {
      f_course: params.get('course') || '',
      f_unit: params.get('unit') || '',
      f_concept: params.get('concept') || ''
    };
    try { await loadMemories(); }
    catch(e){ app.className='error'; app.textContent='Learning Memory를 불러오지 못했습니다: ' + e.message; }
  }
  init();
</script>
</body>
</html>
